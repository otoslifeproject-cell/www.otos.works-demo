<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTOS Continuity™ — Cambridge Pilot (Architecture Map)</title>
  <link rel="stylesheet" href="architecture-map.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="title">OTOS Continuity™ — Cambridge Pilot</h1>
      <p class="subtitle">SaaS-style architecture map · Governance, touchpoints, safety pins</p>
    </header>

    <div class="diagram-container">
      <svg class="flowchart-svg" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" aria-label="OTOS Continuity™ architecture flowchart">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
          </marker>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
          </filter>
        </defs>

        <!-- Cluster: Governance -->
        <g class="cluster">
          <rect x="20" y="12" width="200" height="92" rx="8" fill="rgba(255,255,255,0.95)" stroke="#2563eb" stroke-width="1"/>
          <text x="120" y="32" class="cluster-label" text-anchor="middle" font-weight="600" font-size="11">Governance / Oversight (pilot-grade)</text>
          <rect x="32" y="42" width="176" height="24" rx="4" fill="#fff" stroke="#2563eb" stroke-width="1"/>
          <text x="120" y="57" text-anchor="middle" font-size="10">NHS Commissioners / ICS</text>
          <rect x="32" y="70" width="176" height="24" rx="4" fill="#fff" stroke="#2563eb" stroke-width="1"/>
          <text x="120" y="85" text-anchor="middle" font-size="10">NHS national / Government policy</text>
        </g>

        <!-- Actors -->
        <g class="cluster">
          <rect x="20" y="118" width="200" height="152" rx="8" fill="rgba(255,255,255,0.95)" stroke="#111827" stroke-width="1"/>
          <text x="120" y="138" class="cluster-label" text-anchor="middle" font-weight="600" font-size="11">Actors</text>
          <rect x="32" y="148" width="176" height="22" rx="4" fill="#fff" stroke="#111827"/>
          <text x="120" y="162" text-anchor="middle" font-size="10">Participant (tokenised)</text>
          <rect x="32" y="174" width="176" height="22" rx="4" fill="#fff" stroke="#111827"/>
          <text x="120" y="188" text-anchor="middle" font-size="10">Continuity support (ops)</text>
          <rect x="32" y="200" width="176" height="22" rx="4" fill="#fff" stroke="#111827"/>
          <text x="120" y="214" text-anchor="middle" font-size="10">Reviewer · Lead (view-only) · Admin</text>
        </g>

        <!-- OTOS Continuity™ Layer (main cluster) -->
        <g class="cluster cluster-otos">
          <rect x="240" y="12" width="520" height="396" rx="10" fill="rgba(255,247,237,0.6)" stroke="#f97316" stroke-width="2"/>
          <text x="500" y="34" class="cluster-label" text-anchor="middle" font-weight="600" font-size="12">OTOS Continuity™ Layer (Phase 1) — web-first, low-integration, UK-hosted</text>

          <!-- Surfaces -->
          <text x="260" y="58" font-size="10" font-weight="600" fill="#4a4a4f">Surfaces</text>
          <rect x="260" y="64" width="115" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="317" y="84" text-anchor="middle" font-size="9">Participant web UI</text>
          <rect x="382" y="64" width="95" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="429" y="84" text-anchor="middle" font-size="9">Ops UI</text>
          <rect x="484" y="64" width="95" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="531" y="84" text-anchor="middle" font-size="9">Reviewer UI</text>
          <rect x="586" y="64" width="78" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="625" y="84" text-anchor="middle" font-size="9">Admin UI</text>
          <rect x="671" y="64" width="78" height="36" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="710" y="84" text-anchor="middle" font-size="9">Lead view</text>

          <!-- Core capabilities -->
          <text x="260" y="118" font-size="10" font-weight="600" fill="#4a4a4f">Core capabilities</text>
          <rect x="260" y="124" width="130" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="325" y="143" text-anchor="middle" font-size="9">Tokenised onboarding</text>
          <rect x="397" y="124" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="444" y="143" text-anchor="middle" font-size="9">Micro check-ins</text>
          <rect x="499" y="124" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="546" y="143" text-anchor="middle" font-size="9">Prompts</text>
          <rect x="601" y="124" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="648" y="143" text-anchor="middle" font-size="9">Touchpoints log</text>
          <rect x="703" y="124" width="46" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="726" y="143" text-anchor="middle" font-size="9">Receipts</text>

          <rect x="260" y="162" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="307" y="181" text-anchor="middle" font-size="9">Drift signals</text>
          <rect x="362" y="162" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="409" y="181" text-anchor="middle" font-size="9">Escalation</text>
          <rect x="464" y="162" width="95" height="32" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
          <text x="511" y="181" text-anchor="middle" font-size="9">Reporting</text>

          <!-- Data store & Audit -->
          <rect x="260" y="202" width="220" height="32" rx="6" fill="#fff" stroke="#111827" stroke-dasharray="4 3"/>
          <text x="370" y="221" text-anchor="middle" font-size="9">Pilot data store (tokenised, minimal payload)</text>
          <rect x="490" y="202" width="160" height="32" rx="6" fill="#fff" stroke="#111827" stroke-dasharray="4 3"/>
          <text x="570" y="221" text-anchor="middle" font-size="9">Audit log</text>
        </g>

        <!-- Pilot touchpoints cluster -->
        <g class="cluster">
          <rect x="780" y="12" width="300" height="280" rx="8" fill="rgba(255,255,255,0.95)" stroke="#6b7280" stroke-width="1"/>
          <text x="930" y="32" class="cluster-label" text-anchor="middle" font-weight="600" font-size="11">Pilot touchpoints (end connections)</text>
          <text x="800" y="52" font-size="9" fill="#4a4a4f">Addenbrooke's · GPs · CPFT · HAY · JOY · IAPT</text>
          <text x="800" y="68" font-size="9" fill="#4a4a4f">CGL / CRS · Aftercare · MIND · SUN · Arts & Minds</text>
          <text x="800" y="84" font-size="9" fill="#4a4a4f">Peer · Exercise · SMART · BPHA · DWP · Employment</text>
          <text x="800" y="100" font-size="9" fill="#4a4a4f">Support (other VCSE)</text>
          <line x1="795" y1="108" x2="1075" y2="108" stroke="#6b7280" stroke-width="1"/>
          <text x="930" y="128" text-anchor="middle" font-size="9" font-style="italic">Touchpoints log back into TouchLog / Receipts</text>
        </g>

        <!-- Out of scope -->
        <g class="cluster">
          <rect x="780" y="302" width="300" height="106" rx="8" fill="rgba(255,255,255,0.95)" stroke="#ef4444" stroke-dasharray="6 3" stroke-width="1"/>
          <text x="930" y="322" class="cluster-label" text-anchor="middle" font-weight="600" font-size="11">Out of scope / Options (post-pilot pricing)</text>
          <rect x="792" y="332" width="88" height="28" rx="4" fill="#fff" stroke="#ef4444" stroke-dasharray="6 3"/>
          <text x="836" y="350" text-anchor="middle" font-size="9">Nightingale</text>
          <rect x="888" y="332" width="88" height="28" rx="4" fill="#fff" stroke="#ef4444" stroke-dasharray="6 3"/>
          <text x="932" y="350" text-anchor="middle" font-size="9">Castle Craig</text>
          <rect x="984" y="332" width="88" height="28" rx="4" fill="#fff" stroke="#ef4444" stroke-dasharray="6 3"/>
          <text x="1028" y="350" text-anchor="middle" font-size="9">HelpMeStop</text>
        </g>

        <!-- Safety pins -->
        <g class="cluster cluster-safety">
          <rect x="20" y="418" width="1360" height="82" rx="8" fill="rgba(236,254,255,0.7)" stroke="#0891b2" stroke-width="1"/>
          <text x="700" y="438" class="cluster-label" text-anchor="middle" font-weight="600" font-size="11">Safety pins (non-negotiables)</text>
          <rect x="32" y="448" width="168" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="116" y="472" text-anchor="middle" font-size="9">No NHS record write-back</text>
          <rect x="210" y="448" width="130" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="275" y="472" text-anchor="middle" font-size="9">No diagnostic claims</text>
          <rect x="350" y="448" width="130" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="415" y="472" text-anchor="middle" font-size="9">No prescribing claims</text>
          <rect x="490" y="448" width="200" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="590" y="472" text-anchor="middle" font-size="9">Human-in-control escalation</text>
          <rect x="700" y="448" width="160" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="780" y="472" text-anchor="middle" font-size="9">Auditable receipts always</text>
          <rect x="870" y="448" width="180" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
          <text x="960" y="472" text-anchor="middle" font-size="9">Low integration by design</text>
        </g>

        <!-- Arrows: key flows -->
        <path d="M 120 268 L 120 300 L 317 300 L 317 100" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="200" y="295" font-size="9" fill="#6b7280">Token link</text>
        <path d="M 444 100 L 444 124" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 370 156 L 370 202" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 409 156 L 409 202" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 648 156 L 648 202" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 307 194 L 307 234 L 370 234" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 409 234 L 531 234 L 531 100" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <path d="M 780 150 L 700 150 L 700 124" fill="none" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="730" y="140" font-size="9" fill="#6b7280">logged</text>
        <path d="M 500 408 L 500 418" fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="4 2"/>
      </svg>
    </div>

    <footer class="footer">
      <p>Boxes · Lines · Labels. Pilot touchpoints are end connections, not endorsements. Out of scope options: separate, post-pilot pricing.</p>
    </footer>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTOS Continuity™ — Brain Slice / NHS Layer Install</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0A0E1A;
      --bg-white: #FFFFFF;
      --bg-offwhite: #F9F9F7;
      --slice-start: #FF8C00;
      --slice-end: #FFB347;
      --brain-orange: #ff8a00;
      --nhs-blue: #003087;
      --line-teal: #7FFFD4;
      --text-main: #1a1a1a;
      --text-muted: rgba(0,0,0,0.6);
      /* Timing (all in ms for keyframes + class toggles) */
      --dur-split: 600ms;
      --dur-forward: 700ms;
      --dur-flip: 1000ms;
      --dur-retract: 700ms;
      --dur-logo: 400ms;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg-white);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-white);
      padding: 16px;
    }

    .frame {
      position: relative;
      width: min(100%, 1920px);
      aspect-ratio: 16 / 9;
      background: var(--bg-white);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
      color: var(--text-main);
    }

    .canvas {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Parent for 3D brain motion: perspective 800px */
    .scene-root {
      position: relative;
      width: 80%;
      max-width: 1200px;
      height: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 800px;
    }

    /* Brain container: 3D transform; single turn to reveal thickness, no spin */
    .brain-wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 220px;
      height: 220px;
      margin-left: -110px;
      margin-top: -110px;
      transform-style: preserve-3d;
      will-change: transform;
      transform: translate3d(0, 0, 0) scale(1) rotateY(0deg);
    }

    .brain-slice {
      width: 100%;
      height: 100%;
      transform-origin: center;
      transform-style: preserve-3d;
    }

    .brain-slice img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Thick slice bar: face shows when wrapper is at 90° (counter-rotate so we see thickness, not thin edge) */
    .slice-thickness {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 280px;
      height: 56px;
      margin-left: -140px;
      margin-top: -28px;
      background: linear-gradient(135deg, var(--slice-start), var(--slice-end));
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(255,140,0,0.25);
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
      transform: rotateY(-90deg);
      transform-style: preserve-3d;
    }

    .scene-root.step-1-start .slice-thickness,
    .scene-root.step-2-split .slice-thickness,
    .scene-root.step-3-forward .slice-thickness {
      opacity: 0;
    }

    .scene-root.step-4-flip .slice-thickness {
      animation: thicknessReveal var(--dur-flip) ease-in-out forwards;
    }

    .scene-root.step-5-retract .slice-thickness,
    .scene-root.step-6-logo .slice-thickness {
      opacity: 1;
    }

    @keyframes thicknessReveal {
      0% { opacity: 0; }
      40% { opacity: 0; }
      60% { opacity: 1; }
      100% { opacity: 1; }
    }

    /* NHS + SP logo bands */
    .band {
      position: absolute;
      left: 50%;
      width: 620px;
      transform: translate(-50%, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      opacity: 1;
      will-change: transform;
      transition: transform var(--dur-split) ease-in-out;
    }

    .band--nhs {
      top: 26%;
    }

    .band--sps {
      top: 52%;
      flex-wrap: wrap;
    }

    .band--sps .logo-chip.sun {
      order: 6;
    }

    .logo-nhs {
      padding: 0;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .logo-nhs img {
      display: block;
      height: 80px;
      width: auto;
    }

    .logo-chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      opacity: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logo-chip img {
      display: block;
      height: 44px;
      width: auto;
    }

    /* OTOS wordmark: slots on next to brain in step 7 */
    .otos-wordmark {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: 100px;
      margin-top: -18px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-main);
      opacity: 0;
      transform: translateX(-8px);
      will-change: opacity, transform;
    }

    /* —— SEQUENCE: class-driven keyframes —— */

    /* 1. START: brain visible, front-facing, centred; NHS above, partners below; no spin */
    .scene-root.step-1-start .brain-wrapper {
      transform: translate3d(0, 0, 0) scale(1) rotateY(0deg) rotateX(0deg);
    }
    .scene-root.step-1-start .band--nhs {
      transform: translate(-50%, 0);
    }
    .scene-root.step-1-start .band--sps {
      transform: translate(-50%, 0);
    }
    .scene-root.step-1-start .otos-wordmark {
      opacity: 0;
      transform: translateX(-8px);
    }

    /* 2. SPLIT: top up -120px, bottom down +120px, 600ms ease-in-out */
    .scene-root.step-2-split .band--nhs {
      transform: translate(-50%, -120px);
      transition: transform 600ms ease-in-out;
    }
    .scene-root.step-2-split .band--sps {
      transform: translate(-50%, 120px);
      transition: transform 600ms ease-in-out;
    }

    /* 3. BRAIN COMES FORWARD: translateZ(320px) scale(1.6), 700ms ease-in-out */
    .scene-root.step-3-forward .brain-wrapper {
      animation: brainForward var(--dur-forward) ease-in-out forwards;
    }

    /* 4. TURN 90° TO REVEAL THICKNESS: single turn, no spin (rotateY only, no rotateX) */
    .scene-root.step-4-flip .brain-wrapper {
      animation: brainTurnReveal var(--dur-flip) ease-in-out forwards;
    }

    /* 5. RETRACT: slice (thick) moves straight back and docks in the gap; no rotation */
    .scene-root.step-5-retract .brain-wrapper {
      animation: brainRetract var(--dur-retract) ease-in-out forwards;
    }

    /* 6. LOGO SLOTS ON: wordmark on slice, opacity 0→1, translateX(-8px)→0 */
    .scene-root.step-6-logo .otos-wordmark {
      animation: wordmarkSlot var(--dur-logo) ease-in-out forwards;
    }

    @keyframes brainForward {
      0% {
        transform: translate3d(0, 0, 0) scale(1) rotateY(0deg) rotateX(0deg);
      }
      100% {
        transform: translate3d(0, 0, 320px) scale(1.6) rotateY(0deg) rotateX(0deg);
      }
    }

    /* Single 90° turn to reveal thickness; no vertical spin (no rotateX) */
    @keyframes brainTurnReveal {
      0% {
        transform: translate3d(0, 0, 320px) scale(1.6) rotateY(0deg) rotateX(0deg);
      }
      100% {
        transform: translate3d(0, 0, 320px) scale(1.6) rotateY(90deg) rotateX(0deg);
      }
    }

    /* Retract straight back into gap; slice stays thick (rotateY 90°) when docked */
    @keyframes brainRetract {
      0% {
        transform: translate3d(0, 0, 320px) scale(1.6) rotateY(90deg) rotateX(0deg);
      }
      100% {
        transform: translate3d(0, 0, 0) scale(1) rotateY(90deg) rotateX(0deg);
      }
    }

    @keyframes wordmarkSlot {
      0% {
        opacity: 0;
        transform: translateX(-8px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .frame {
      animation: frameIn 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes frameIn {
      to { opacity: 1; }
    }

    /* Replay button — shown after sequence completes */
    .replay-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      padding: 10px 20px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-main);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .replay-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .replay-btn:hover {
      background: #fff;
      border-color: rgba(0,0,0,0.15);
    }

    @media (max-width: 960px) {
      .scene-root {
        width: 94%;
        height: 74%;
      }
      .brain-wrapper {
        width: 180px;
        height: 180px;
        margin-left: -90px;
        margin-top: -90px;
      }
      .band {
        width: 90%;
      }
      .otos-wordmark {
        margin-left: 80px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="frame">
      <div class="canvas">
        <div class="scene-root step-1-start" id="sceneRoot" aria-hidden="true">
          <div class="brain-wrapper" id="brainWrapper">
            <div class="brain-slice">
              <img src="../assets/brain.png" alt="OTOS brain slice">
            </div>
            <div class="slice-thickness" aria-hidden="true"></div>
          </div>

          <div class="band band--nhs" id="bandNHS">
            <div class="logo-nhs">
              <img src="../assets/nhs%20logo.png" alt="NHS logo">
            </div>
          </div>

          <div class="band band--sps" id="bandSps">
            <div class="logo-chip">
              <img src="../assets/partners/NHS_CPFT_Logo.png" alt="CPFT logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/CGL_Logo.png" alt="CGL logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/CRS_Logo.png" alt="CRS logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/Addenbrookes_Logo.png" alt="Addenbrooke's logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/MIND_Logo.png" alt="Mind logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/Keep_Your_Head_Logo.png" alt="Keep Your Head logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/RCE_Logo.png" alt="RCE Hub logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/Jo_Fenton_Logo.png" alt="Jo Fenton logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/Gillvray_Health_Logo.png" alt="Gillvray Health logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/WorkWell_Logo.png" alt="WorkWell logo">
            </div>
            <div class="logo-chip">
              <img src="../assets/partners/Psymplicity_Logo.png" alt="Psymplicity logo">
            </div>
            <div class="logo-chip sun">
              <img src="../assets/partners/The_Sun_Network_Logo.png" alt="The SUN Network logo">
            </div>
          </div>

          <div class="otos-wordmark" id="otosWordmark">OTOS Continuity™</div>
        </div>
      </div>

      <button type="button" class="replay-btn" id="replayBtn" aria-label="Replay animation">Replay</button>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      var sceneRoot = document.getElementById("sceneRoot");
      var brainWrapper = document.getElementById("brainWrapper");
      var replayBtn = document.getElementById("replayBtn");

      var STEPS = [
        { id: "step-1-start",   dur: 800 },
        { id: "step-2-split",   dur: 600 },
        { id: "step-3-forward", dur: 700 },
        { id: "step-4-flip",    dur: 1000 },
        { id: "step-5-retract", dur: 700 },
        { id: "step-6-logo",    dur: 600 }
      ];

      var currentStepIndex = 0;
      var playing = true;
      var stepStartTime = performance.now();

      function setStep(index) {
        currentStepIndex = index;
        sceneRoot.className = "scene-root " + STEPS[index].id;

        if (index === STEPS.length - 1) {
          replayBtn.classList.add("visible");
        } else {
          replayBtn.classList.remove("visible");
        }
      }

      function advanceStep() {
        var next = currentStepIndex + 1;
        if (next >= STEPS.length) {
          next = 0;
        }
        setStep(next);
      }

      function loop(now) {
        if (!playing) {
          requestAnimationFrame(loop);
          return;
        }

        var elapsed = now - stepStartTime;
        var currentDur = STEPS[currentStepIndex].dur;

        if (elapsed >= currentDur) {
          stepStartTime = now;
          if (currentStepIndex < STEPS.length - 1) {
            advanceStep();
          }
        }

        requestAnimationFrame(loop);
      }

      function replay() {
        currentStepIndex = 0;
        setStep(0);
        playing = true;
        stepStartTime = performance.now();
        requestAnimationFrame(loop);
      }

      replayBtn.addEventListener("click", replay);

      document.addEventListener("keydown", function(e) {
        if (e.code === "Space") {
          e.preventDefault();
          if (currentStepIndex === STEPS.length - 1 && !playing) {
            replay();
          } else {
            playing = !playing;
            if (playing) {
              stepStartTime = performance.now();
              requestAnimationFrame(loop);
            }
          }
        }
      });

      setStep(0);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>

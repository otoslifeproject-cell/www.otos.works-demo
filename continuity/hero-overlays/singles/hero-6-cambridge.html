<!DOCTYPE html>
<html lang="en" class="hero-single-page">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hero 6 — Cambridge / System Level · OTOS</title>
  <link rel="stylesheet" href="../hero-overlays.css">
  <style>
.hero-block, .hero-wrapper, [class*="hero"] {
  width: 100%;
  height: 100vh;
  min-height: 480px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  transition: background-position 0.3s ease;
}
@media (max-width: 768px) {
  h1, .hero-headline {
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    line-height: 1.2;
  }
  .stats-card, [class*="stat"] {
    bottom: 1rem;
    right: 1rem;
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body>
  <div class="hero-block hero-block--landscape hero-block--fullscreen">
    <img class="hero-block__img" src="../../images/Golden hour in Cambridge.png" alt="Cambridge / System Level">
    <div class="hero-block__overlay">
      <div class="hero-logo-strip">
        <img class="hero-logo-strip__brain" src="../../../assets/brain.png" alt="">
        <span class="hero-logo-strip__wordmark">OTOS</span>
      </div>
      <div class="hero-copy">
        <h2 class="hero-headline">All the support already exists. It's never been connected like this.</h2>
        <p class="hero-sub">OTOS syncs CPFT, CGL, CRS, SUN, Primary Care and A&E into one encrypted continuity journey — without replacing any of them.</p>
        <a href="../../how-it-works.html" class="hero-cta">View System Overview</a>
      </div>
    </div>
    <div class="stats-overlay stats-overlay--h6">
      <div class="stat-block"><div class="stat-label">Services connected</div><div class="stat-value">7</div></div>
      <div class="stat-block"><div class="stat-label">Pilot participants</div><div class="stat-value">47 / 50</div></div>
      <div class="stat-block"><div class="stat-label">Pilot status</div><div class="stat-value">🟢 On track</div></div>
    </div>
  </div>
</body>
</html>

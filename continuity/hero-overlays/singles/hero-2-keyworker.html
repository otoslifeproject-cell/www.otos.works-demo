<!DOCTYPE html>
<html lang="en" class="hero-single-page">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hero 2 — Keyworker & Client · OTOS</title>
  <link rel="stylesheet" href="../hero-overlays.css">
  <style>
.hero-block, .hero-wrapper, [class*="hero"] {
  width: 100%;
  height: 100vh;
  min-height: 480px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  transition: background-position 0.3s ease;
}
@media (max-width: 768px) {
  h1, .hero-headline {
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    line-height: 1.2;
  }
  .stats-card, [class*="stat"] {
    bottom: 1rem;
    right: 1rem;
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body>
  <div class="hero-block hero-block--portrait hero-block--fullscreen">
    <img class="hero-block__img" src="../../images/Meaningful conversation in a cosy café.png" alt="Keyworker & Client">
    <div class="hero-block__overlay">
      <div class="hero-logo-strip">
        <img class="hero-logo-strip__brain" src="../../../assets/brain.png" alt="">
        <span class="hero-logo-strip__wordmark">OTOS</span>
      </div>
      <div class="hero-copy">
        <h2 class="hero-headline">Built for keyworkers. Engineered around real journeys.</h2>
        <p class="hero-sub">No new system. No extra forms. Just clarity about what happened next.</p>
        <a href="../../guided-demos.html" class="hero-cta">Keyworker View</a>
      </div>
    </div>
    <div class="stats-overlay stats-overlay--h2">
      <div class="stat-block"><div class="stat-label">Follow-through rate</div><div class="stat-value positive">81%</div></div>
      <div class="stat-block"><div class="stat-label">Missed follow-ups prevented</div><div class="stat-value">38</div></div>
      <div class="stat-block"><div class="stat-label">Partner burden (self-reported)</div><div class="stat-value positive">Low</div></div>
    </div>
  </div>
</body>
</html>

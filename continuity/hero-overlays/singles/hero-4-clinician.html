<!DOCTYPE html>
<html lang="en" class="hero-single-page">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hero 4 — Female Clinician & Patient · OTOS</title>
  <link rel="stylesheet" href="../hero-overlays.css">
  <style>
.hero-block, .hero-wrapper, [class*="hero"] {
  width: 100%;
  height: 100vh;
  min-height: 480px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  transition: background-position 0.3s ease;
}
@media (max-width: 768px) {
  h1, .hero-headline {
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    line-height: 1.2;
  }
  .stats-card, [class*="stat"] {
    bottom: 1rem;
    right: 1rem;
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body>
  <div class="hero-block hero-block--landscape hero-block--fullscreen">
    <img class="hero-block__img" src="../../images/NHS team meeting in progress.png" alt="Female Clinician & Patient">
    <div class="hero-block__overlay">
      <div class="hero-logo-strip">
        <img class="hero-logo-strip__brain" src="../../../assets/brain.png" alt="">
        <span class="hero-logo-strip__wordmark">OTOS</span>
      </div>
      <div class="hero-copy">
        <h2 class="hero-headline">A city-wide view with zero clinical risk.</h2>
        <p class="hero-sub">Live anonymous flow across the whole Cambridge ecosystem — where journeys stall, where crisis builds, where investment lands best.</p>
        <a href="../../reporting.html" class="hero-cta">View Reporting</a>
      </div>
    </div>
  </div>

</html>

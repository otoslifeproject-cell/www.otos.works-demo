<!DOCTYPE html>
<html lang="en" class="hero-single-page">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hero 5 — Senior Doctor · OTOS</title>
  <link rel="stylesheet" href="../hero-overlays.css">
  <style>
.hero-block, .hero-wrapper, [class*="hero"] {
  width: 100%;
  height: 100vh;
  min-height: 480px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  transition: background-position 0.3s ease;
}
@media (max-width: 768px) {
  h1, .hero-headline {
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    line-height: 1.2;
  }
  .stats-card, [class*="stat"] {
    bottom: 1rem;
    right: 1rem;
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body>
  <div class="hero-block hero-block--portrait hero-block--fullscreen">
    <img class="hero-block__img" src="../../images/Man checking phone outside community centre.png" alt="Senior Doctor / Encrypted Invisible Secure">
    <div class="hero-block__overlay">
      <div class="hero-logo-strip">
        <img class="hero-logo-strip__brain" src="../../../assets/brain.png" alt="">
        <span class="hero-logo-strip__wordmark">OTOS</span>
      </div>
      <div class="hero-copy">
        <h2 class="hero-headline">Encrypted. Invisible. Secure.</h2>
        <p class="hero-sub">No names. No NHS numbers. No clinical records held. OTOS works around what exists — without touching it.</p>
        <a href="../../controls.html" class="hero-cta">View Controls</a>
      </div>
    </div>
    <div class="stats-overlay stats-overlay--h5">
      <div class="stat-block"><div class="stat-label">Data held by OTOS</div><div class="stat-value positive">Zero</div></div>
      <div class="stat-block"><div class="stat-label">Tokens only</div><div class="stat-value">Anonymous</div></div>
      <div class="stat-block"><div class="stat-label">Human review rate</div><div class="stat-value positive">96%</div></div>
    </div>
  </div>
</body>
</html>

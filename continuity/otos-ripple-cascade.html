    function buildCpftInteriorMask(img) {
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      const oc = document.createElement('canvas');
      oc.width = w;
      oc.height = h;
      const ox = oc.getContext('2d');
      ox.drawImage(img, 0, 0);
      const { data } = ox.getImageData(0, 0, w, h);

      function lightAt(px, py) {
        if (px < 0 || py < 0 || px >= w || py >= h) return false;
        const i = (py * w + px) * 4;
        return data[i] > 210 && data[i + 1] > 210 && data[i + 2] > 210;
      }

      let sx = Math.floor(w / 2);
      let sy = Math.floor(h / 2);
      if (!lightAt(sx, sy)) {
        let found = false;
        for (let py = 0; py < h && !found; py += 4) {
          for (let px = 0; px < w && !found; px += 4) {
            if (lightAt(px, py)) { sx = px; sy = py; found = true; }
          }
        }
        if (!found) return null;
      }

      const filled = new Uint8Array(w * h);
      const stack = [[sx, sy]];
      while (stack.length) {
        const [x, y] = stack.pop();
        const idx = y * w + x;
        if (x < 0 || y < 0 || x >= w || y >= h || filled[idx]) continue;
        if (!lightAt(x, y)) continue;
        filled[idx] = 1;
        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }

      const mc = document.createElement('canvas');
      mc.width = w;
      mc.height = h;
      const mx = mc.getContext('2d');
      const imgData = mx.createImageData(w, h);
      for (let i = 0; i < filled.length; i++) {
        if (!filled[i]) continue;
        const p = i * 4;
        imgData.data[p] = 255;
        imgData.data[p + 1] = 255;
        imgData.data[p + 2] = 255;
        imgData.data[p + 3] = 255;
      }
      mx.putImageData(imgData, 0, 0);
      return mc;
    }

    function buildCpftOutlineOnly(img) {
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      const cctx = c.getContext('2d');
      cctx.drawImage(img, 0, 0);
      const id = cctx.getImageData(0, 0, w, h);
      const d = id.data;
      const th = CONFIG.CPFT_OUTLINE_DARK_THRESHOLD;
      for (let i = 0; i < d.length; i += 4) {
        const lum = (d[i] + d[i + 1] + d[i + 2]) / 3;
        if (lum > th) {
          d[i + 3] = 0;
        } else {
          d[i]     = 248;
          d[i + 1] = 242;
          d[i + 2] = 232;
          d[i + 3] = 255;
        }
      }
      cctx.putImageData(id, 0, 0);
      return c;
    }

      im.crossOrigin = 'anonymous';
      im.onload = () => {
        state.cpftMapImage = im;
        state.cpftMaskCanvas = buildCpftInteriorMask(im);
        state.cpftOutlineCanvas = buildCpftOutlineOnly(im);
        layoutCPFTMap();
        if (state.act2Points_canvas.length > 0) reinitAct2Coords();
        if (state.act3Points_canvas.length > 0) reinitAct3Coords();
        rebuildLayer3OriginCanvasCoords();
        if (state.act4Points_canvas.length > 0) reinitAct4Coords();
      };
      im.src = CONFIG.CPFT_MAP_SRC;
    }

    function layoutCPFTMap() {
      const img = state.cpftMapImage;
      if (!img || !img.naturalWidth) return;
      const maxH = canvas.height * CONFIG.CPFT_MAP_MAX_HEIGHT_RATIO;
      const aspect = img.naturalWidth / img.naturalHeight;
      const mh = maxH;
      const mw = mh * aspect;
      const x = (canvas.width - mw) / 2;
      const cy = canvas.height * CONFIG.CPFT_MAP_CENTER_Y_RATIO;
      const y = cy - mh / 2;
      state.cpftMapRect = { x, y, w: mw, h: mh };
      state.origin.x = x + CONFIG.CPFT_ORIGIN_NX * mw;
      state.origin.y = y + CONFIG.CPFT_ORIGIN_NY * mh;
      state.cpftCentroidCanvas = { x: state.origin.x, y: state.origin.y };
    }

    function mapNormToCanvas(nx, ny) {
      const r = state.cpftMapRect;
      if (!r) {
        return { x: canvas.width * CONFIG.ORIGIN_X_RATIO, y: canvas.height * CONFIG.ORIGIN_Y_RATIO };
      }
      return { x: r.x + nx * r.w, y: r.y + ny * r.h };
    }

    function drawCpftOutsideDim() {
      const r = state.cpftMapRect;
      const mask = state.cpftMaskCanvas;
      if (!r || !mask) return;
      ctx.save();
      ctx.fillStyle = `rgba(8, 6, 4, ${CONFIG.CPFT_OUTSIDE_DIM_ALPHA})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'destination-out';
      ctx.drawImage(mask, r.x, r.y, r.w, r.h);
      ctx.restore();
    }

    function drawCpftOutlineOnly() {
      const r = state.cpftMapRect;
      const oc = state.cpftOutlineCanvas;
      if (!r || !oc) return;
      ctx.save();
      ctx.shadowColor = 'rgba(245,240,232,0.45)';
      ctx.shadowBlur  = scaled(3.5);
      ctx.drawImage(oc, r.x, r.y, r.w, r.h);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.92;
      ctx.drawImage(oc, r.x, r.y, r.w, r.h);
      ctx.restore();
    }

    function drawCpftNodeEmphasis() {
      const r = state.cpftMapRect;
      if (!r) return;
      const pr = scaled(CONFIG.CPFT_NODE_GLOW_RADIUS);
      CONFIG.CPFT_NODES.forEach(n => {
        const px = r.x + n.nx * r.w;
        const py = r.y + n.ny * r.h;
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.beginPath();
        ctx.arc(px, py, pr * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(232, 114, 12, 0.35)';
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.fillStyle = '#c62828';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,252,246,0.85)';
        ctx.lineWidth = scaled(1);
        ctx.stroke();
        ctx.restore();
      });
    }

    // ============================================================
    // Canvas resize — recalculate scaleFactor, origin, vignette
    // ============================================================
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      scaleFactor = Math.min(canvas.width / 1280, canvas.height / 800);
      layoutCPFTMap();
      if (!state.cpftMapRect) {
        state.origin.x = canvas.width  * CONFIG.ORIGIN_X_RATIO;
        state.origin.y = canvas.height * CONFIG.ORIGIN_Y_RATIO;
      }
      buildVignetteGradient();
      if (state.act2Points_canvas.length > 0) reinitAct2Coords();
      if (state.act3Points_canvas.length > 0) reinitAct3Coords();
      rebuildLayer3OriginCanvasCoords();
      if (state.act4Points_canvas.length > 0) reinitAct4Coords();
    }

    function reinitAct2Coords() {
      state.act2Points_canvas.forEach((p, i) => {
        p.x = state.origin.x + Math.cos(ACT2_POINTS[i].angleRad) * scaled(ACT2_POINTS[i].radiusPx);
        p.y = state.origin.y + Math.sin(ACT2_POINTS[i].angleRad) * scaled(ACT2_POINTS[i].radiusPx);
      });
    }

    function reinitAct3Coords() {
      state.act3Points_canvas.forEach((p, i) => {
        const src = ACT3_POINTS[i];
        const parent = src.parentIndex >= 0
          ? state.act2Points_canvas[src.parentIndex]
          : state.origin;
        p.parentX = parent.x;
        p.parentY = parent.y;
        p.x = parent.x + Math.cos(src.offsetAngleRad) * scaled(src.offsetRadiusPx);
        p.y = parent.y + Math.sin(src.offsetAngleRad) * scaled(src.offsetRadiusPx);
      });
    }

    function reinitAct4Coords() {
      state.act4Points_canvas.forEach((p, i) => {
        const src = ACT4_POINTS[i];
        const parent = state.act3Points_canvas.find(a => a.name === src.parentName);
        if (parent) {
          p.parentX = parent.x;
          p.parentY = parent.y;
          p.x = parent.x + Math.cos(src.offsetAngleRad) * scaled(src.offsetRadiusPx);
          p.y = parent.y + Math.sin(src.offsetAngleRad) * scaled(src.offsetRadiusPx);
        }
      });
    }

    // ============================================================
    // Cost counter — top-right glass panel (full-scroll design language)
    // ============================================================

    function pathRoundRect(ctx2, x, y, w, h, rad) {
      const r = Math.min(rad, w / 2, h / 2);
      ctx2.beginPath();
      ctx2.moveTo(x + r, y);
      ctx2.arcTo(x + w, y, x + w, y + h, r);
      ctx2.arcTo(x + w, y + h, x, y + h, r);
      ctx2.arcTo(x, y + h, x, y, r);
      ctx2.arcTo(x, y, x + w, y, r);
      ctx2.closePath();
    }

    function startCounterAnimation(fromValue, toValue, durationMs, timestamp) {
      state.counterAnimating    = true;
      state.counterAnimStartTime = timestamp;
      state.counterAnimFrom      = fromValue;
      state.counterAnimTo        = toValue;
      state.counterAnimDuration  = durationMs;
    }

    function updateCounter(timestamp) {
      if (!state.counterAnimating) return;
      const t = clamp((timestamp - state.counterAnimStartTime) / state.counterAnimDuration, 0, 1);
      const easedT = easeInOut(t);
      state.counterDisplayValue = lerp(state.counterAnimFrom, state.counterAnimTo, easedT);
      if (t >= 1) {
        state.counterAnimating    = false;
        state.counterDisplayValue = state.counterAnimTo;
      }
    }

    function wrapHubTextToLines(text, maxW, fontStr) {
      ctx.font = fontStr;
      const words = String(text).split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      words.forEach(word => {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      return lines;
    }

    function maxLineWidth(lines, fontStr) {
      ctx.font = fontStr;
      let w = 0;
      lines.forEach(l => { w = Math.max(w, ctx.measureText(l).width); });
      return w;
    }

    function drawHubPanel(timestamp) {
      if (state.currentAct < 1) return;
      if (state.counterDisplayValue < 1 && !state.act1CounterKickoff && !state.act5ChaosStartTime && !state.act5QuestionPhase) return;

      const r = state.cpftMapRect;
      const hubCx = r ? r.x + r.w / 2 : canvas.width / 2;
      const maxPanelW = Math.min(
        scaled(580),
        r ? r.w * 0.9 : canvas.width * 0.92,
        canvas.width - scaled(20)
      );
      const innerPadX = scaled(CONFIG.HUB_INNER_PAD_X);
      const innerPadY = scaled(CONFIG.HUB_INNER_PAD_Y);
      const textMaxW  = maxPanelW - innerPadX * 2;
      const rad       = scaled(CONFIG.COUNTER_CENTRE_RADIUS);
      const gap       = scaled(CONFIG.HUB_SECTION_GAP);
      const ga        = state.globalAlpha * state.counterPulseAlpha;

      let valueStr;
      let chaosSpin = false;
      if (state.act5QuestionPhase) {
        valueStr = '???';
      } else if (state.act5ChaosStartTime !== null) {
        const dt = timestamp - state.act5ChaosStartTime;
        if (dt >= CONFIG.ACT5_CHAOS_SPIRAL_MS) {
          valueStr = '£' + Math.round(state.counterDisplayValue).toLocaleString('en-GB');
        } else {
          chaosSpin = true;
          const spiral = dt * 2.8;
          const v =
            195000 +
            Math.sin(spiral * 0.034) * 380000 +
            (dt / CONFIG.ACT5_CHAOS_SPIRAL_MS) * 910000 +
            Math.cos(spiral * 0.071) * 165000;
          valueStr = '£' + Math.max(0, Math.floor(v)).toLocaleString('en-GB');
        }
      } else {
        valueStr = '£' + Math.round(Math.max(0, state.counterDisplayValue)).toLocaleString('en-GB');
      }

      const labelStr = 'ANNUAL SYSTEM COST';
      const subStr = state.act5QuestionPhase
        ? 'Indicative only — the true total is unknown.'
        : 'per person · per year · indicative minimum';

      ctx.save();
      ctx.font = `600 ${scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE)}px 'Playfair Display', serif`;
      const valueW = ctx.measureText(valueStr).width;
      ctx.font = `600 ${scaled(CONFIG.COUNTER_CENTRE_LABEL_SIZE)}px 'Inter', sans-serif`;
      const labelW = ctx.measureText(labelStr).width;
      ctx.font = `300 ${scaled(CONFIG.COUNTER_CENTRE_SUB_SIZE)}px 'Inter', sans-serif`;
      const subW = ctx.measureText(subStr).width;

      let narrLines = [];
      if (state.narratorCurrentText && state.narratorAlpha > 0.02) {
        const na = state.cinematicFreeze ? state.narratorAlpha * CONFIG.FREEZE_LABEL_DIM_ALPHA : state.narratorAlpha;
        if (na > 0.02) {
          narrLines = wrapHubTextToLines(
            state.narratorCurrentText,
            textMaxW,
            `${CONFIG.NARRATOR_FONT_WEIGHT} ${scaled(CONFIG.NARRATOR_FONT_SIZE)}px 'Inter', sans-serif`
          );
        }
      }

      const mid = state.hubMidBlock;
      const midAlpha = mid && typeof mid.alpha === 'number' ? clamp(mid.alpha, 0, 1) : 0;
      const mid1Font = `700 ${scaled(CONFIG.HUB_MID_LINE1_SIZE)}px 'Playfair Display', serif`;
      const mid2Font = `400 ${scaled(CONFIG.HUB_MID_LINE2_SIZE)}px 'Inter', sans-serif`;
      let mid1Lines = [];
      let mid2Lines = [];
      if (mid && midAlpha > 0.02 && mid.line1) {
        mid1Lines = wrapHubTextToLines(mid.line1, textMaxW, mid1Font);
      }
      if (mid && midAlpha > 0.02 && mid.line2) {
        mid2Lines = wrapHubTextToLines(mid.line2, textMaxW, mid2Font);
      }

      const extraFont = `400 ${scaled(CONFIG.HUB_EXTRA_FONT_SIZE)}px 'Inter', sans-serif`;
      let extraLines = [];
      (state.hubExtraLines || []).slice(0, CONFIG.HUB_MAX_EXTRA_LINES).forEach(ex => {
        wrapHubTextToLines(ex, textMaxW, extraFont).forEach(l => extraLines.push(l));
      });

      const lhN  = scaled(CONFIG.NARRATOR_FONT_SIZE) * CONFIG.NARRATOR_LINE_HEIGHT_EM;
      const lhE  = scaled(CONFIG.HUB_EXTRA_FONT_SIZE) * 1.35;
      const lhM1 = scaled(CONFIG.HUB_MID_LINE1_SIZE) * 1.15;
      const lhM2 = scaled(CONFIG.HUB_MID_LINE2_SIZE) * 1.35;

      const counterBlockH =
        scaled(CONFIG.COUNTER_CENTRE_LABEL_SIZE + 8) +
        scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE + 8) +
        scaled(CONFIG.COUNTER_CENTRE_SUB_SIZE);

      const freezeActive = state.cinematicFreeze && state.freezeStartTime !== null;
      let freezeH = 0;
      let freezeContentW = 0;
      if (freezeActive) {
        freezeH = gap;
        state.freezeLines.forEach((line, i) => {
          const fs = `${line.style} ${scaled(line.size)}px 'Playfair Display', serif`;
          ctx.font = fs;
          freezeContentW = Math.max(freezeContentW, ctx.measureText(line.text).width);
          freezeH += scaled(line.size) * 1.45;
          if (i < state.freezeLines.length - 1) freezeH += scaled(6);
        });
      }

      const narrH = narrLines.length ? gap + narrLines.length * lhN : 0;
      const midH =
        mid1Lines.length || mid2Lines.length
          ? gap + mid1Lines.length * lhM1 + (mid2Lines.length ? scaled(6) + mid2Lines.length * lhM2 : 0)
          : 0;
      const extraH = extraLines.length ? gap + extraLines.length * lhE : 0;
      const hasLower =
        freezeActive || narrLines.length || midH > 0 || extraLines.length;
      const dividerH = hasLower ? scaled(10) : 0;

      const contentW = Math.max(
        valueW,
        labelW,
        subW,
        freezeContentW,
        maxLineWidth(narrLines, `${CONFIG.NARRATOR_FONT_WEIGHT} ${scaled(CONFIG.NARRATOR_FONT_SIZE)}px 'Inter', sans-serif`),
        maxLineWidth(mid1Lines, mid1Font),
        maxLineWidth(mid2Lines, mid2Font),
        maxLineWidth(extraLines, extraFont)
      );
      const panelW = Math.min(maxPanelW, contentW + innerPadX * 2);
      const panelH =
        innerPadY * 2 +
        counterBlockH +
        dividerH +
        freezeH +
        narrH +
        midH +
        extraH;

      const anchorY = r ? r.y + r.h * 0.44 : canvas.height * 0.5;
      let panelTop = anchorY - panelH / 2;
      let panelX = hubCx - panelW / 2;
      panelTop = clamp(panelTop, scaled(10), canvas.height - panelH - scaled(10));
      panelX = clamp(panelX, scaled(8), canvas.width - panelW - scaled(8));

      pathRoundRect(ctx, panelX, panelTop, panelW, panelH, rad);
      ctx.fillStyle = CONFIG.HUB_PANEL_FILL;
      ctx.fill();
      ctx.strokeStyle = CONFIG.HUB_PANEL_STROKE;
      ctx.lineWidth   = scaled(CONFIG.COUNTER_PANEL_STROKE_WIDTH);
      ctx.stroke();

      const cx = panelX + panelW / 2;
      let ty = panelTop + innerPadY;

      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.globalAlpha = 0.95 * ga;
      ctx.fillStyle   = CONFIG.COLOR_SUBTEXT;
      ctx.font        = `600 ${scaled(CONFIG.COUNTER_CENTRE_LABEL_SIZE)}px 'Inter', sans-serif`;
      ctx.fillText(labelStr, cx, ty);
      ty += scaled(CONFIG.COUNTER_CENTRE_LABEL_SIZE + 8);

      if (chaosSpin) {
        const dt = timestamp - state.act5ChaosStartTime;
        const midY = ty + scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE) / 2;
        ctx.translate(cx, midY);
        ctx.rotate(Math.sin(dt * 0.014) * 0.09);
        ctx.translate(-cx, -midY);
      }
      ctx.globalAlpha = ga;
      ctx.fillStyle   = state.act5QuestionPhase ? CONFIG.COLOR_COUNTER_ACCENT : CONFIG.COLOR_COUNTER;
      ctx.font        = `600 ${scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE)}px 'Playfair Display', serif`;
      ctx.fillText(valueStr, cx, ty);
      if (chaosSpin) {
        const dt = timestamp - state.act5ChaosStartTime;
        const midY = ty + scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE) / 2;
        ctx.translate(cx, midY);
        ctx.rotate(-Math.sin(dt * 0.014) * 0.09);
        ctx.translate(-cx, -midY);
      }
      ty += scaled(CONFIG.COUNTER_CENTRE_VALUE_SIZE + 8);

      ctx.globalAlpha = 0.9 * ga;
      ctx.fillStyle   = CONFIG.COLOR_TINY;
      ctx.font        = `300 ${scaled(CONFIG.COUNTER_CENTRE_SUB_SIZE)}px 'Inter', sans-serif`;
      ctx.fillText(subStr, cx, ty);
      ty += scaled(CONFIG.COUNTER_CENTRE_SUB_SIZE + (dividerH ? gap * 0.5 : 0));

      if (hasLower) {
        ctx.globalAlpha = 0.95 * ga;
        ctx.strokeStyle = 'rgba(245,240,232,0.18)';
        ctx.lineWidth   = scaled(1);
        ctx.beginPath();
        ctx.moveTo(panelX + innerPadX, ty);
        ctx.lineTo(panelX + panelW - innerPadX, ty);
        ctx.stroke();
        ty += scaled(10);
      }

      if (freezeActive) {
        ty += gap;
        state.freezeLines.forEach((line, i) => {
          const lineH = scaled(line.size) * 1.45;
          if (line.alpha >= 0.01) {
            ctx.save();
            ctx.globalAlpha = line.alpha * ga;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'top';
            ctx.font         = `${line.style} ${scaled(line.size)}px 'Playfair Display', serif`;
            ctx.fillStyle    = line.color;
            if (i === 0 || i === 1) {
              ctx.shadowBlur  = scaled(12);
              ctx.shadowColor = i === 1 ? 'rgba(255,138,0,0.45)' : 'rgba(255,255,255,0.15)';
            }
            ctx.fillText(line.text, cx, ty);
            ctx.shadowBlur  = 0;
            ctx.shadowColor = 'transparent';
            ctx.restore();
          }
          ty += lineH;
          if (i < state.freezeLines.length - 1) ty += scaled(6);
        });
      }

      const nAlpha = state.cinematicFreeze
        ? state.narratorAlpha * CONFIG.FREEZE_LABEL_DIM_ALPHA
        : state.narratorAlpha;
      ctx.globalAlpha = clamp(nAlpha, 0, 1) * ga;
      ctx.fillStyle   = CONFIG.NARRATOR_COLOR;
      ctx.font        = `${CONFIG.NARRATOR_FONT_WEIGHT} ${scaled(CONFIG.NARRATOR_FONT_SIZE)}px 'Inter', sans-serif`;
      narrLines.forEach(ln => {
        ctx.fillText(ln, cx, ty);
        ty += lhN;
      });

      if (mid1Lines.length || mid2Lines.length) {
        ctx.globalAlpha = midAlpha * ga;
        ctx.fillStyle   = CONFIG.COLOR_COUNTER_ACCENT;
        ctx.font        = mid1Font;
        mid1Lines.forEach(ln => {
          ctx.fillText(ln, cx, ty);
          ty += lhM1;
        });
        ctx.fillStyle = CONFIG.COLOR_SUBTEXT;
        ctx.font      = mid2Font;
        if (mid2Lines.length) ty += scaled(4);
        mid2Lines.forEach(ln => {
          ctx.fillText(ln, cx, ty);
          ty += lhM2;
        });
      }

      ctx.globalAlpha = 0.92 * ga;
      ctx.fillStyle   = CONFIG.COLOR_COST_LABEL;
      ctx.font        = extraFont;
      extraLines.forEach(ln => {
        ctx.fillText(ln, cx, ty);
        ty += lhE;
      });

      ctx.restore();
    }

    // Update alpha for all registered text-fade state objects every frame
    function updateTextFades(timestamp) {
      const keys = [
        'textAct1',
        'textAct6Line1', 'textAct6Line2', 'textAct6Line3'
      ];
      keys.forEach(key => {
        const t = state[key];
        if (t.visible && t.startTime !== null) {
          t.alpha = easeInOut(clamp((timestamp - t.startTime) / t.duration, 0, 1));
        }
      });
    }

    // ============================================================
    // Drawing primitives (unchanged)
    // ============================================================

    function drawBackground() {
      const grad = ctx.createRadialGradient(
        canvas.width * 0.52, canvas.height * 0.42, 0,
        canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.85
      );
      grad.addColorStop(0, '#2a2218');
      grad.addColorStop(0.42, CONFIG.BG_COLOR_2);
      grad.addColorStop(1, CONFIG.BG_COLOR_1);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawStone(x, y, radius, colour) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = colour;
      ctx.fill();
      ctx.restore();
    }

    function drawStoneGlow(x, y, glowRings) {
      const alphas = [0.15, 0.10, 0.05];
      glowRings.forEach((r, i) => {
        ctx.save();
        ctx.globalAlpha = alphas[i];
        ctx.beginPath();
        ctx.arc(x, y, scaled(r), 0, Math.PI * 2);
        ctx.strokeStyle = CONFIG.COLOR_STONE_ACCENT;
        ctx.lineWidth   = scaled(1);
        ctx.stroke();
        ctx.restore();
      });
    }

    // ============================================================
    // Layer 2 — Vignette
    // ============================================================

    // Build the cached vignette radial gradient — call on init and every resize
    function buildVignetteGradient() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const diagonal = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
      const outerRadius = diagonal * CONFIG.VIGNETTE_OUTER_RADIUS_FACTOR;

      vignetteGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerRadius);
      vignetteGradient.addColorStop(0,                          'rgba(0,0,0,0)');
      vignetteGradient.addColorStop(CONFIG.VIGNETTE_INNER_STOP, 'rgba(0,0,0,0)');
      vignetteGradient.addColorStop(1.0, `rgba(0,0,0,${CONFIG.VIGNETTE_OUTER_ALPHA})`);
    }

    // Draw full-canvas vignette rectangle — corners are darkened, centre is transparent
    function drawVignette() {
      if (!vignetteGradient) return;
      ctx.save();
      ctx.fillStyle = vignetteGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    // ============================================================
    // Layer 2 — Narrator text system
    // ============================================================

    // Set narrator text — fades out current text first, then fades in new text
    function setNarratorText(text) {
      if (state.narratorCurrentText === text) return;
      if (state.narratorAlpha < 0.05) {
        state.narratorCurrentText = text;
        state.narratorTargetAlpha = 1;
        state.narratorPendingSet  = false;
      } else {
        state.narratorPendingText  = text;
        state.narratorTargetAlpha  = 0;
        state.narratorPendingSet   = true;
      }
    }

    // Clear narrator text — fades out without replacement
    function clearNarratorText() {
      state.narratorTargetAlpha = 0;
      state.narratorPendingSet  = false;
    }

    // Update narrator alpha per frame — smooth lerp toward target
    function updateNarratorAlpha() {
      const speed = state.narratorAlpha < state.narratorTargetAlpha
        ? CONFIG.NARRATOR_FADE_IN_SPEED
        : CONFIG.NARRATOR_FADE_OUT_SPEED;

      state.narratorAlpha += (state.narratorTargetAlpha - state.narratorAlpha) * speed;
      state.narratorAlpha  = clamp(state.narratorAlpha, 0, 1);

      // Swap pending text once current text has faded out
      if (state.narratorPendingSet && state.narratorAlpha < 0.04) {
        state.narratorCurrentText = state.narratorPendingText;
        state.narratorTargetAlpha = 1;
        state.narratorPendingSet  = false;
      }
    }

    // Narrator + detail copy render inside drawHubPanel (single opaque stack under £).

    // ============================================================
    // Layer 2 — Cinematic freeze beat
    // ============================================================

    // Begin the cinematic freeze — resets all freeze line states
    function startCinematicFreeze(timestamp) {
      state.cinematicFreeze = true;
      state.freezeStartTime = timestamp;
      state.freezeLines.forEach(line => {
        line.alpha     = 0;
        line.triggered = false;
      });
    }

    // Update and draw the cinematic freeze overlay and timed text lines
    function updateAndDrawCinematicFreeze(timestamp) {
      if (!state.cinematicFreeze) return;

      const freezeElapsed = timestamp - state.freezeStartTime;
      const delays = [CONFIG.FREEZE_LINE1_DELAY, CONFIG.FREEZE_LINE2_DELAY, CONFIG.FREEZE_LINE3_DELAY];

      // Fade in each freeze text line at its staggered delay
      state.freezeLines.forEach((line, i) => {
        const lineElapsed = freezeElapsed - delays[i];
        if (lineElapsed < 0) return;
        line.alpha = easeInOut(clamp(lineElapsed / CONFIG.FREEZE_TEXT_FADE_MS, 0, 1));
      });

      // Dimming overlay ramps up over 600ms at freeze start
      const overlayAlpha = clamp(freezeElapsed / 600, 0, 0.35);
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();

      // Freeze copy is drawn inside drawHubPanel only — never on the canvas behind the hub
      // (avoids “ghost” bleed-through and keeps one narrative surface).

      // End freeze after FREEZE_DURATION — Layer 3 schedule (origins draw next frame; avoids painting over freeze)
      if (freezeElapsed >= CONFIG.FREEZE_DURATION) {
        if (state.currentAct === 5 && state.layer3SpawnBaseTime === null && state.freezeStartTime !== null) {
          state.layer3SpawnBaseTime = state.freezeStartTime + CONFIG.FREEZE_DURATION;
          state.layer3DeferDrawOneFrame = true;
        }
        state.cinematicFreeze = false;
        state.freezeStartTime = null;
      }
    }

    // ============================================================
    // Layer 3 Phase 1 — secondary origins (spawn post-freeze, Act 5)
    // ============================================================

    function rebuildLayer3OriginCanvasCoords() {
      if (!state.layer3Origins) return;
      state.layer3Origins.forEach(o => {
        const p = mapNormToCanvas(o.nx, o.ny);
        o.x = p.x;
        o.y = p.y;
      });
    }

    function ensureLayer3Phase1Origins() {
      if (state.layer3Origins) return;
      const specs = [
        { nx: CONFIG.LAYER3_ORIGIN_A_NX, ny: CONFIG.LAYER3_ORIGIN_A_NY },
        { nx: CONFIG.LAYER3_ORIGIN_B_NX, ny: CONFIG.LAYER3_ORIGIN_B_NY },
        { nx: CONFIG.LAYER3_ORIGIN_C_NX, ny: CONFIG.LAYER3_ORIGIN_C_NY }
      ];
      state.layer3Origins = [];
      const n = Math.min(CONFIG.LAYER3_ORIGIN_COUNT, specs.length);
      for (let i = 0; i < n; i++) {
        state.layer3Origins.push({
          nx: specs[i].nx,
          ny: specs[i].ny,
          x: 0,
          y: 0,
          fadeStartTime: null,
          birthPulseStartTime: null,
          birthPulseDone: false
        });
      }
      rebuildLayer3OriginCanvasCoords();
    }

    function updateLayer3Phase1Origins(timestamp) {
      if (state.currentAct !== 5 || state.layer3SpawnBaseTime === null) return;
      ensureLayer3Phase1Origins();
      state.layer3Origins.forEach((origin, index) => {
        const spawnAt = state.layer3SpawnBaseTime + index * CONFIG.LAYER3_SPAWN_DELAY_MS;
        if (timestamp < spawnAt) return;
        if (origin.fadeStartTime === null) {
          origin.fadeStartTime = spawnAt;
        }
        const ft = timestamp - origin.fadeStartTime;
        const t = clamp(ft / CONFIG.LAYER3_ORIGIN_FADE_IN_MS, 0, 1);
        if (t >= 1 && !origin.birthPulseDone) {
          origin.birthPulseStartTime = timestamp;
          origin.birthPulseDone = true;
        }
      });
    }

    function drawLayer3Phase1Origins(timestamp) {
      if (state.currentAct !== 5 || state.layer3SpawnBaseTime === null) return;
      if (state.layer3DeferDrawOneFrame) {
        state.layer3DeferDrawOneFrame = false;
        return;
      }
      if (!state.layer3Origins) return;
      state.layer3Origins.forEach((origin, index) => {
        const spawnAt = state.layer3SpawnBaseTime + index * CONFIG.LAYER3_SPAWN_DELAY_MS;
        if (timestamp < spawnAt || origin.fadeStartTime === null) return;

        const ft = timestamp - origin.fadeStartTime;
        const t = clamp(ft / CONFIG.LAYER3_ORIGIN_FADE_IN_MS, 0, 1);
        const easeT = easeOut(t);

        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = easeT;
        ctx.fillStyle = CONFIG.COLOR_STONE_ACCENT;
        ctx.beginPath();
        ctx.arc(origin.x, origin.y, scaled(CONFIG.LAYER3_ORIGIN_DOT_RADIUS) * easeT, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (origin.birthPulseStartTime !== null) {
          const pt = clamp((timestamp - origin.birthPulseStartTime) / CONFIG.IMPACT_PULSE_DURATION_MS, 0, 1);
          const pulseEase = easeOut(pt);
          const pr = pulseEase * scaled(CONFIG.LAYER3_BIRTH_PULSE_RADIUS);
          const pa = CONFIG.LAYER3_BIRTH_PULSE_ALPHA * (1 - pt);
          if (pa > 0.01 && pr > 0.5) {
            ctx.save();
            ctx.globalAlpha = pa;
            ctx.strokeStyle = CONFIG.LAYER3_BIRTH_PULSE_STROKE;
            ctx.lineWidth = scaled(CONFIG.LAYER3_BIRTH_PULSE_LINE_WIDTH);
            ctx.beginPath();
            ctx.arc(origin.x, origin.y, pr, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }
      });
    }


    // ============================================================
    // Ring rendering system — Layer 1 drawGlowRing updated for L2
    // ============================================================

    // Three-pass glow ring — Gen 1 unchanged; Gen 2 and Gen 3 updated with L2 values
    function drawGlowRing(ring) {
      if (ring.currentAlpha <= 0 || ring.currentRadius <= 0) return;

      const gen = ring.generation;
      let baseLineWidth, glowBlur, glowColor, strokeColor;

      if (gen === 1) {
        // Gen 1 — UNCHANGED
        baseLineWidth = scaled(CONFIG.RING_GEN1_LINE_WIDTH);
        glowBlur      = CONFIG.RING_GEN1_GLOW_BLUR;
        glowColor     = CONFIG.RING_GEN1_GLOW_COLOR;
        strokeColor   = `rgba(255,138,0,${ring.currentAlpha})`;
      } else if (gen === 2) {
        // Gen 2 — Layer 2 corrected values for full visibility
        baseLineWidth = scaled(CONFIG.RING_GEN2_LINE_WIDTH_L2);
        glowBlur      = CONFIG.RING_GEN2_GLOW_BLUR_L2;
        glowColor     = CONFIG.RING_GEN2_GLOW_COLOR_L2;
        strokeColor   = `rgba(200,146,42,${ring.currentAlpha})`;
      } else {
        // Gen 3 — Layer 2 corrected values; faint ghost ring
        baseLineWidth = scaled(CONFIG.RING_GEN3_LINE_WIDTH_L2);
        glowBlur      = 0;
        glowColor     = 'transparent';
        strokeColor   = `rgba(255,255,255,${ring.currentAlpha})`;
      }

      // Pass 1: outer halo — all generations, gen-specific alpha multiplier
      const haloMult = gen <= 2 ? 0.12 : 0.08;
      ctx.save();
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, ring.currentRadius, 0, Math.PI * 2);
      ctx.strokeStyle = strokeColor.replace(/[\d.]+\)$/, `${ring.currentAlpha * haloMult})`);
      ctx.lineWidth   = baseLineWidth * 2.8;
      ctx.globalAlpha = 1;
      ctx.stroke();
      ctx.restore();

      // Pass 2: mid glow — all generations, gen-specific alpha multiplier
      const midMult = gen <= 2 ? 0.30 : 0.20;
      ctx.save();
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, ring.currentRadius, 0, Math.PI * 2);
      ctx.strokeStyle = strokeColor.replace(/[\d.]+\)$/, `${ring.currentAlpha * midMult})`);
      ctx.lineWidth   = baseLineWidth * 1.6;
      ctx.globalAlpha = 1;
      ctx.stroke();
      ctx.restore();

      // Pass 3: core ring with shadow glow (gen 1 and 2 only get shadowBlur)
      ctx.save();
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, ring.currentRadius, 0, Math.PI * 2);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth   = baseLineWidth;
      ctx.globalAlpha = 1;
      if (gen <= 2) {
        ctx.shadowBlur  = glowBlur;
        ctx.shadowColor = glowColor;
      }
      ctx.stroke();
      ctx.shadowBlur  = 0;
      ctx.shadowColor = 'transparent';
      ctx.restore();
    }

    // Draw accumulated ghost traces beneath active rings with decay + hard cap.
    function drawGhostTraces(timestamp) {
      state.ghostTraces = state.ghostTraces
        .filter(trace => timestamp - trace.createdAt <= CONFIG.GHOST_TRACE_MAX_AGE_MS)
        .sort((a, b) => b.createdAt - a.createdAt)
        .slice(0, CONFIG.MAX_GHOST_TRACES);

      state.ghostTraces.forEach(trace => {
        const age = Math.max(0, timestamp - trace.createdAt);
        const decay = Math.exp(-age / CONFIG.GHOST_TRACE_HALF_LIFE_MS);
        const baseAlpha = CONFIG.GHOST_TRACE_ALPHA * decay;
        if (baseAlpha <= 0.004) return;
        ctx.save();
        ctx.beginPath();
        ctx.arc(trace.x, trace.y, trace.radius, 0, Math.PI * 2);
        if (trace.generation === 1) {
          ctx.strokeStyle = `rgba(255,138,0,${baseAlpha})`;
        } else if (trace.generation === 2) {
          ctx.strokeStyle = `rgba(200,146,42,${baseAlpha})`;
        } else {
          ctx.strokeStyle = `rgba(255,255,255,${baseAlpha * 0.6})`;
        }
        ctx.lineWidth   = scaled(CONFIG.GHOST_TRACE_LINE_WIDTH);
        ctx.globalAlpha = 1;
        ctx.stroke();
        ctx.restore();
      });
    }

    // Check whether a ring's expanding edge has reached any of its trigger points
    function checkRingTriggers(ring, timestamp) {
      if (ring.contracting) return;
      if (!ring.triggerPoints || ring.triggerPoints.length === 0) return;

      ring.triggerPoints.forEach(point => {
        if (point.triggered) return;

        const dx = point.x - ring.x;
        const dy = point.y - ring.y;
        const distanceToPoint = Math.sqrt(dx * dx + dy * dy);
        const tolerance = scaled(CONFIG.RING_TRIGGER_TOLERANCE);

        if (
          ring.currentRadius >= distanceToPoint - tolerance &&
          ring.currentRadius <= distanceToPoint + tolerance + (ring.expandDuration / 1000) * 2
        ) {
          point.triggered = true;

          if (point.canvasRef) {
            point.canvasRef.triggered          = true;
            point.canvasRef.labelFadeStartTime = timestamp;
          }

          // Impact pulse — bright radial flash at collision point
          state.pulses.push({
            x:         point.x,
            y:         point.y,
            startTime: timestamp,
            maxRadius: scaled(CONFIG.IMPACT_PULSE_MAX_RADIUS),
            colour:    ring.generation === 1 ? '#ffffff' : '#F0C060',
            active:    true
          });

          if (point.costValue && point.costValue > 0) {
            startCounterAnimation(
              state.counterDisplayValue,
              state.counterDisplayValue + point.costValue,
              1200,
              timestamp
            );
          }

          if (point.spawnChildRing && ring.generation < 3) {
            spawnRing(
              point.x,
              point.y,
              ring.generation + 1,
              point.childTriggerPoints || [],
              timestamp
            );
          }
        }
      });
    }

    // Update all rings and pulses — freeze-aware; gen-specific fade delay
    function updateAndDrawRings(timestamp) {
      // During freeze: draw rings at reduced alpha only, no position updates
      if (state.cinematicFreeze) {
        drawGhostTraces(timestamp);
        state.rings.forEach(ring => {
          const frozenRing = { ...ring, currentAlpha: ring.currentAlpha * 0.15 };
          drawGlowRing(frozenRing);
        });
        return;
      }

      drawGhostTraces(timestamp);

      state.rings = state.rings.filter(ring => {
        if (!ring.active) return false;

        const elapsed = timestamp - ring.startTime;

        // Update radius — expand outward OR contract inward (visual-only “bounce back”)
        const expandT = clamp(elapsed / ring.expandDuration, 0, 1);
        if (ring.contracting) {
          ring.currentRadius = ring.maxRadius * (1 - easeInOut(expandT));
        } else {
          ring.currentRadius = easeOut(expandT) * ring.maxRadius;
        }

        // Fade delay ratio is generation-specific (Layer 2 fix)
        const fadeDelayRatio = ring.generation === 1
          ? 0.60
          : ring.generation === 2
          ? CONFIG.RING_GEN2_FADE_DELAY_RATIO
          : CONFIG.RING_GEN3_FADE_DELAY_RATIO;

        const fadeStartElapsed = ring.expandDuration * fadeDelayRatio;
        const fadeElapsed      = Math.max(0, elapsed - fadeStartElapsed);
        const fadeT            = clamp(fadeElapsed / ring.fadeDuration, 0, 1);
        ring.currentAlpha      = lerp(ring.startAlpha, 0, easeInOut(fadeT));

        if (!ring.contracting) {
          checkRingTriggers(ring, timestamp);
        }

        // Record ghost trace when ring first nears zero alpha
        if (ring.currentAlpha <= 0.06 && !ring.ghostTraceCreated) {
          state.ghostTraces.push({
            x:          ring.x,
            y:          ring.y,
            radius:     ring.currentRadius,
            generation: ring.generation,
            createdAt:  timestamp,
          });
          ring.ghostTraceCreated = true;
        }

        if (ring.currentAlpha > 0.01) {
          drawGlowRing(ring);
          return true;
        }
        return false;
      });

      // Update and draw impact pulses
      state.pulses = state.pulses.filter(pulse => {
        const elapsed = timestamp - pulse.startTime;
        const t       = clamp(elapsed / CONFIG.IMPACT_PULSE_DURATION_MS, 0, 1);
        const radius  = easeOut(t) * pulse.maxRadius;
        const alpha   = 1 - t;

        if (alpha > 0.01) {
          ctx.save();
          ctx.globalAlpha = alpha * 0.9;
          ctx.fillStyle   = pulse.colour;
          ctx.shadowBlur  = scaled(15);
          ctx.shadowColor = pulse.colour;
          ctx.beginPath();
          ctx.arc(pulse.x, pulse.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur  = 0;
          ctx.shadowColor = 'transparent';
          ctx.restore();
          return true;
        }
        return false;
      });

      // Hard cap pulse pool to keep highlights readable.
      if (state.pulses.length > CONFIG.MAX_ACTIVE_PULSES) {
        state.pulses = state.pulses.slice(-CONFIG.MAX_ACTIVE_PULSES);
      }
    }

    // Spawn a new ring into the pool — Layer 2 corrected maxRadius and alpha for gen 2/3
    function spawnRing(x, y, generation, triggerPoints, timestamp) {
      if (state.rings.length >= CONFIG.MAX_ACTIVE_RINGS) {
        // Keep strongest/newest rings; evict weakest old ring so narrative can continue.
        let evictIndex = -1;
        let weakestScore = Number.POSITIVE_INFINITY;
        for (let i = 0; i < state.rings.length; i++) {
          const r = state.rings[i];
          const age = Math.max(1, timestamp - r.startTime);
          const score = (r.currentAlpha + 0.03) / age;
          if (score < weakestScore) {
            weakestScore = score;
            evictIndex = i;
          }
        }
        if (evictIndex >= 0) {
          state.rings.splice(evictIndex, 1);
        }
      }

      let genConfig;
      if (generation === 1) {
        genConfig = {
          maxR:   canvas.height * CONFIG.PRIMARY_RING_MAX_RADIUS_RATIO,
          expand: CONFIG.RING_GEN1_EXPAND_MS,
          fade:   CONFIG.RING_GEN1_FADE_MS,
          alpha:  CONFIG.RING_GEN1_START_ALPHA
        };
      } else if (generation === 2) {
        // Layer 2: increased maxRadius to ensure rings reach all trigger targets
        genConfig = {
          maxR:   canvas.height * 0.42,
          expand: CONFIG.RING_GEN2_EXPAND_MS,
          fade:   CONFIG.RING_GEN2_FADE_MS,
          alpha:  CONFIG.RING_GEN2_START_ALPHA_L2
        };
      } else {
        genConfig = {
          maxR:   canvas.height * 0.28,
          expand: CONFIG.RING_GEN3_EXPAND_MS,
          fade:   CONFIG.RING_GEN3_FADE_MS,
          alpha:  CONFIG.RING_GEN3_START_ALPHA_L2
        };
      }

      state.rings.push({
        id:                ringIdCounter++,
        x,
        y,
        generation,
        maxRadius:         genConfig.maxR,
        startTime:         timestamp,
        expandDuration:    genConfig.expand,
        fadeDuration:      genConfig.fade,
        startAlpha:        genConfig.alpha,
        currentRadius:     0,
        currentAlpha:      genConfig.alpha,
        ghostTraceCreated: false,
        triggerPoints:     triggerPoints.map(p => ({ ...p, triggered: false })),
        active:            true,
        contracting:       false
      });
    }

    function spawnContractingRingsBurst(timestamp) {
      const c = state.cpftCentroidCanvas || state.origin;
      const maxR =
        Math.max(canvas.width, canvas.height) * CONFIG.ACT4_INWARD_MAX_RADIUS_RATIO * 0.48;
      const n = CONFIG.ACT4_INWARD_RING_COUNT;
      for (let i = 0; i < n; i++) {
        if (state.rings.length >= CONFIG.MAX_ACTIVE_RINGS) break;
        state.rings.push({
          id:                ringIdCounter++,
          x:                 c.x,
          y:                 c.y,
          generation:        1,
          maxRadius:         maxR,
          startTime:         timestamp + i * 260,
          expandDuration:    CONFIG.ACT4_INWARD_RING_DURATION_MS,
          fadeDuration:      CONFIG.RING_GEN1_FADE_MS,
          startAlpha:        CONFIG.RING_GEN1_START_ALPHA * 0.78,
          currentRadius:     maxR,
          currentAlpha:      CONFIG.RING_GEN1_START_ALPHA * 0.78,
          ghostTraceCreated: false,
          triggerPoints:     [],
          active:            true,
          contracting:       true
        });
      }
    }

    function spawnAct5ExplosiveRings(ts) {
      if (state.act5ExplosiveFired) return;
      state.act5ExplosiveFired = true;
      const ordered = CONFIG.CPFT_NODES
        .map(n => {
          const p = mapNormToCanvas(n.nx, n.ny);
          const dx = p.x - state.origin.x;
          const dy = p.y - state.origin.y;
          return { p, d2: dx * dx + dy * dy };
        })
        .sort((a, b) => a.d2 - b.d2)
        .slice(0, CONFIG.ACT5_NODE_BURST_MAX_NODES);

      ordered.forEach((entry, i) => {
        const delay = i * CONFIG.ACT5_NODE_BURST_STAGGER_MS;
        spawnRing(entry.p.x, entry.p.y, 1, [], ts + delay);
        if (i % 2 === 0) {
          spawnRing(entry.p.x, entry.p.y, 2, [], ts + delay + CONFIG.ACT5_NODE_BURST_GEN2_DELAY_MS);
        }
      });
    }

    // ============================================================
    // Act transition state machine
    // ============================================================

    function transitionToAct(nextAct, timestamp) {
      if (state.transitioning) return;
      state.transitioning       = true;
      state.transitionStartTime = timestamp;
      state.transitionTargetAct = nextAct;

      // Clear ring pool on every act transition
      state.rings        = [];
      state.pulses       = [];
      state.ghostTraces  = [];
      ringIdCounter      = 0;

      // Layer 2: clear narrator and freeze state on transition
      clearNarratorText();
      state.narratorSetForAct = false;
      state.cinematicFreeze   = false;
      state.freezeStartTime   = null;
      state.freezeFired       = false;
      state.freezeLines.forEach(line => { line.alpha = 0; line.triggered = false; });
      state.layer3SpawnBaseTime = null;
      state.layer3Origins = null;
      state.layer3DeferDrawOneFrame = false;
      state.hubExtraLines = [];
      state.hubMidBlock   = null;
    }

    function processTransition(timestamp) {
      if (!state.transitioning) return;
      const elapsed = timestamp - state.transitionStartTime;
      const half    = CONFIG.TRANSITION_DURATION / 2;

      if (elapsed < half) {
        state.globalAlpha = lerp(1, 0, elapsed / half);
      } else if (elapsed < CONFIG.TRANSITION_DURATION) {
        if (state.currentAct !== state.transitionTargetAct) {
          state.currentAct   = state.transitionTargetAct;
          state.actStartTime = null;
        }
        state.globalAlpha = lerp(0, 1, (elapsed - half) / half);
      } else {
        if (state.currentAct !== state.transitionTargetAct) {
          state.currentAct   = state.transitionTargetAct;
          state.actStartTime = null;
        }
        state.globalAlpha  = 1;
        state.transitioning = false;
      }
    }

    // ============================================================
    // ACT 1: One person. The first stone drops.
    // ============================================================

    function runAct1(elapsed, timestamp) {
      // Set narrator text once per act
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText('One person. Undiagnosed ADHD. Active addiction.');
      }

      if (!state.act1CounterKickoff) {
        state.act1CounterKickoff = true;
        startCounterAnimation(0, 4200, 5000, timestamp);
      }

      if (!state.act1RingSpawned) {
        state.act1RingSpawned = true;
        spawnRing(state.origin.x, state.origin.y, 1, [], timestamp);
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      if (elapsed >= CONFIG.ACT1_DURATION && !state.transitioning) {
        initAct2();
        transitionToAct(2, timestamp);
      }
    }

    // ============================================================
    // ACT 2: The system responds. Direct costs appear.
    // ============================================================

    function initAct2() {
      state.act2Points_canvas = ACT2_POINTS.map(p => ({
        ...p,
        x:                  state.origin.x + Math.cos(p.angleRad) * scaled(p.radiusPx),
        y:                  state.origin.y + Math.sin(p.angleRad) * scaled(p.radiusPx),
        triggered:          false,
        labelAlpha:         0,
        labelFadeStartTime: null
      }));
      state.act2RingSpawned = false;
    }

    function runAct2(elapsed, timestamp) {
      // Set narrator text once per act
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText('The system responds.');
        state.hubExtraLines = ACT2_POINTS.map(
          p => `${p.label} — ${p.sublabel}`
        );
      }

      if (!state.act2RingSpawned) {
        state.act2RingSpawned = true;

        const act3Pre = ACT3_POINTS.map(p => {
          const parent = p.parentIndex >= 0
            ? state.act2Points_canvas[p.parentIndex]
            : state.origin;
          return {
            x:           parent.x + Math.cos(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
            y:           parent.y + Math.sin(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
            costValue:   p.costValue,
            name:        p.name,
            parentIndex: p.parentIndex
          };
        });

        const act4Pre = ACT4_POINTS.map(p => {
          const parent3 = act3Pre.find(a => a.name === p.parentName);
          return {
            x:          parent3.x + Math.cos(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
            y:          parent3.y + Math.sin(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
            costValue:  0,
            parentName: p.parentName
          };
        });

        function makeGen3Triggers(personName) {
          return act4Pre
            .filter(p => p.parentName === personName)
            .map(p => ({
              x:                  p.x,
              y:                  p.y,
              costValue:          0,
              triggered:          false,
              spawnChildRing:     false,
              childTriggerPoints: [],
              canvasRef:          null
            }));
        }

        function makeGen2Triggers(act2Idx) {
          return act3Pre
            .filter((p, i) => ACT3_POINTS[i].parentIndex === act2Idx)
            .map(p => ({
              x:                  p.x,
              y:                  p.y,
              costValue:          p.costValue,
              triggered:          false,
              spawnChildRing:     true,
              childTriggerPoints: makeGen3Triggers(p.name),
              canvasRef:          null
            }));
        }

        const gen1TriggerPoints = state.act2Points_canvas.map((p, i) => ({
          x:                  p.x,
          y:                  p.y,
          costValue:          p.costValue,
          triggered:          false,
          spawnChildRing:     true,
          childTriggerPoints: makeGen2Triggers(i),
          canvasRef:          p
        }));

        [4, 5].forEach(idx => {
          const p = act3Pre[idx];
          gen1TriggerPoints.push({
            x:                  p.x,
            y:                  p.y,
            costValue:          p.costValue,
            triggered:          false,
            spawnChildRing:     true,
            childTriggerPoints: [],
            canvasRef:          null
          });
        });

        spawnRing(state.origin.x, state.origin.y, 1, gen1TriggerPoints, timestamp);
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      state.act2Points_canvas.forEach(point => {
        if (!point.triggered) return;
        const labelT = clamp((timestamp - point.labelFadeStartTime) / CONFIG.TEXT_FADE_DURATION, 0, 1);
        point.labelAlpha = easeInOut(labelT);
      });

      if (elapsed >= CONFIG.ACT2_DURATION && !state.transitioning) {
        initAct3();
        transitionToAct(3, timestamp);
      }
    }

    // ============================================================
    // ACT 3: The ripple reaches people.
    // ============================================================

    const ACT3_STAGGER_DELAYS = [0, 2000, 4000, 6000, 8000, 10000];

    function initAct3() {
      state.act3Points_canvas = ACT3_POINTS.map(p => {
        const parent = p.parentIndex >= 0
          ? state.act2Points_canvas[p.parentIndex]
          : state.origin;
        return {
          ...p,
          parentX:            parent.x,
          parentY:            parent.y,
          x:                  parent.x + Math.cos(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
          y:                  parent.y + Math.sin(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
          triggered:          false,
          labelAlpha:         0,
          labelFadeStartTime: null,
          ringSpawned:        false
        };
      });

      // Verify Gen 2 ring maxRadius covers all trigger distances — console warning if too small
      state.act3Points_canvas.forEach(p => {
        if (p.parentIndex >= 0) {
          const parent = state.act2Points_canvas[p.parentIndex];
          const dx = p.x - parent.x;
          const dy = p.y - parent.y;
          const requiredRadius = Math.sqrt(dx * dx + dy * dy) + scaled(20);
          const gen2MaxR = canvas.height * 0.42;
          if (gen2MaxR < requiredRadius) {
            console.warn(`OTOS: Gen2 ring from point ${p.parentIndex} maxRadius ${gen2MaxR.toFixed(0)} < required ${requiredRadius.toFixed(0)}`);
          }
        }
      });
    }

    function runAct3(elapsed, timestamp) {
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText('The ripple reaches the people around them.');
        state.hubExtraLines = ACT3_POINTS.map(
          p => `${p.name}: ${p.label} · ${p.cost}`
        );
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      // Staggered Gen 2 ring spawns
      state.act3Points_canvas.forEach((point, i) => {
        if (elapsed >= ACT3_STAGGER_DELAYS[i] && !point.ringSpawned) {
          point.ringSpawned = true;

          const act4TailTriggers = ACT4_POINTS
            .filter(a4p => a4p.parentName === point.name)
            .map(a4p => ({
              x:                  point.x + Math.cos(a4p.offsetAngleRad) * scaled(a4p.offsetRadiusPx),
              y:                  point.y + Math.sin(a4p.offsetAngleRad) * scaled(a4p.offsetRadiusPx),
              costValue:          0,
              triggered:          false,
              spawnChildRing:     false,
              childTriggerPoints: [],
              canvasRef:          null
            }));

          spawnRing(point.parentX, point.parentY, 2, [{
            x:                  point.x,
            y:                  point.y,
            costValue:          ACT3_POINTS[i].costValue,
            triggered:          false,
            spawnChildRing:     true,
            childTriggerPoints: act4TailTriggers,
            canvasRef:          point
          }], timestamp);
        }
      });

      state.act3Points_canvas.forEach(point => {
        if (!point.triggered) return;
        const labelT = clamp((timestamp - point.labelFadeStartTime) / CONFIG.TEXT_FADE_DURATION, 0, 1);
        point.labelAlpha = easeInOut(labelT);
      });

      if (elapsed >= CONFIG.ACT3_DURATION && !state.transitioning) {
        initAct4();
        transitionToAct(4, timestamp);
      }
    }

    // ============================================================
    // ACT 4: The invisible tail. The real but untracked.
    // ============================================================

    const ACT4_STAGGER_DELAYS = [0, 3000, 6000];

    function initAct4() {
      state.act4InwardBurstFired = false;
      state.act4Points_canvas = ACT4_POINTS.map(p => {
        const parent = state.act3Points_canvas.find(a => a.name === p.parentName);
        return {
          ...p,
          parentX:            parent.x,
          parentY:            parent.y,
          x:                  parent.x + Math.cos(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
          y:                  parent.y + Math.sin(p.offsetAngleRad) * scaled(p.offsetRadiusPx),
          triggered:          false,
          labelAlpha:         0,
          labelFadeStartTime: null,
          ringSpawned:        false
        };
      });
      state.act4ClimaxVisible   = false;
      state.act4ClimaxAlpha     = 0;
      state.act4ClimaxStartTime = null;
    }

    function runAct4(elapsed, timestamp) {
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText('And further still — to people no one is tracking.');
        state.hubExtraLines = ACT4_POINTS.map(
          p => `${p.label} — ${p.sublabel} (${p.costLabel})`
        );
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      // Staggered Gen 3 ring spawns
      state.act4Points_canvas.forEach((point, i) => {
        if (elapsed >= ACT4_STAGGER_DELAYS[i] && !point.ringSpawned) {
          point.ringSpawned = true;
          spawnRing(point.parentX, point.parentY, 3, [{
            x:                  point.x,
            y:                  point.y,
            costValue:          0,
            triggered:          false,
            spawnChildRing:     false,
            childTriggerPoints: [],
            canvasRef:          point
          }], timestamp);
        }
      });

      state.act4Points_canvas.forEach(point => {
        if (!point.triggered) return;
        const labelT = clamp((timestamp - point.labelFadeStartTime) / CONFIG.TEXT_FADE_DURATION, 0, 1);
        point.labelAlpha = easeInOut(labelT);
      });

      const climaxTriggerMs = CONFIG.ACT4_DURATION - 6000;
      if (elapsed >= climaxTriggerMs && !state.act4ClimaxVisible) {
        state.act4ClimaxVisible   = true;
        state.act4ClimaxStartTime = timestamp;
      }
      if (state.act4ClimaxVisible) {
        const climaxT = clamp((timestamp - state.act4ClimaxStartTime) / 800, 0, 1);
        state.act4ClimaxAlpha = easeInOut(climaxT);
        state.hubMidBlock = {
          line1: '£40,070 minimum.',
          line2: 'Single year. Single person. One touch each service.',
          alpha: state.act4ClimaxAlpha
        };
        state.counterPulseAlpha = 0.85 + 0.15 * Math.sin(timestamp / 400);
      }

      if (
        elapsed >= CONFIG.ACT4_DURATION - CONFIG.ACT4_INWARD_BURST_BEFORE_END_MS &&
        !state.act4InwardBurstFired
      ) {
        state.act4InwardBurstFired = true;
        spawnContractingRingsBurst(timestamp);
      }

      if (elapsed >= CONFIG.ACT4_DURATION && !state.transitioning) {
        state.counterPulseAlpha = 1;
        initAct5();
        transitionToAct(5, timestamp);
      }
    }

    // ============================================================
    // ACT 5: ADHD is inherited. The child stone drops. Freeze beat.
    // ============================================================

    function initAct5() {
      state.childVisible        = false;
      state.childAlpha          = 0;
      state.childFadeStartTime  = null;
      state.childStoneDropped   = false;
      state.childTextVisible    = false;
      state.childTextAlpha      = 0;
      state.childTextStartTime  = null;
      state.act5RingSpawned     = false;
      state.freezeFired         = false;
      state.layer3SpawnBaseTime = null;
      state.layer3Origins = null;
      state.layer3DeferDrawOneFrame = false;
      state.act5ChaosStartTime = null;
      state.act5ExplosiveFired = false;
      state.act5QuestionPhase = false;
      state.act5FinalNarratorDone = false;
    }

    function drawChildFigure(x, y, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = CONFIG.COLOR_NAME_LABEL;
      ctx.beginPath();
      ctx.arc(x, y - scaled(14), scaled(4), 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x, y - scaled(10));
      ctx.lineTo(x, y);
      ctx.strokeStyle = CONFIG.COLOR_NAME_LABEL;
      ctx.lineWidth   = scaled(1.5);
      ctx.stroke();
      ctx.restore();
    }

    function runAct5(elapsed, timestamp) {
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText('ADHD is inherited. The cycle begins again.');
        state.hubExtraLines = [];
        state.hubMidBlock   = null;
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      const childX = state.origin.x + scaled(CONFIG.CHILD_OFFSET_X);
      const childY = state.origin.y + scaled(CONFIG.CHILD_OFFSET_Y);

      if (!state.childVisible) {
        state.childVisible       = true;
        state.childFadeStartTime = timestamp;
      }
      state.childAlpha = easeInOut(clamp((timestamp - state.childFadeStartTime) / 800, 0, 1));
      drawChildFigure(childX, childY, state.childAlpha);

      // Child stone drops at 3500ms
      if (elapsed >= 3500 && !state.childStoneDropped) {
        state.childStoneDropped = true;
        startCounterAnimation(
          CONFIG.COUNTER_FLOOR,
          CONFIG.COUNTER_FLOOR + CONFIG.COUNTER_CHILD_ADD,
          6000,
          timestamp
        );
      }

      if (state.childStoneDropped && !state.act5RingSpawned) {
        state.act5RingSpawned = true;
        spawnRing(childX, childY, 2, [], timestamp);
      }

      if (state.childStoneDropped) {
        drawStone(childX, childY, scaled(CONFIG.CHILD_STONE_RADIUS), CONFIG.RING_CHILD);
      }

      // Cinematic freeze beat at FREEZE_START_ELAPSED — replaces old textAct5Line1/2/3
      if (elapsed >= CONFIG.FREEZE_START_ELAPSED && !state.cinematicFreeze && !state.freezeFired) {
        state.freezeFired = true;
        startCinematicFreeze(timestamp);
      }

      if (
        state.freezeFired &&
        !state.cinematicFreeze &&
        state.layer3SpawnBaseTime !== null &&
        state.act5ChaosStartTime === null
      ) {
        state.act5ChaosStartTime = timestamp;
        spawnAct5ExplosiveRings(timestamp);
      }

      if (state.act5ChaosStartTime !== null && !state.act5QuestionPhase) {
        if (timestamp - state.act5ChaosStartTime >= CONFIG.ACT5_CHAOS_SPIRAL_MS) {
          state.act5QuestionPhase = true;
          if (!state.act5FinalNarratorDone) {
            state.act5FinalNarratorDone = true;
            setNarratorText(CONFIG.ACT5_FINAL_NARRATOR);
          }
        }
      }

      if (elapsed >= CONFIG.ACT5_DURATION && !state.transitioning) {
        initAct6();
        transitionToAct(6, timestamp);
      }
    }

    // ============================================================
    // ACT 6: OTOS enters. The cycle breaks.
    // ============================================================

    function initAct6() {
      state.textAct6Line1 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.textAct6Line2 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.textAct6Line3 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.act6RingStartTime    = null;
      state.act6FadeOutStartTime = null;
      state.act6FinaleStartTime  = null;
    }

    function runAct6(elapsed, timestamp) {
      if (!state.narratorSetForAct) {
        state.narratorSetForAct = true;
        setNarratorText(CONFIG.ACT6_OPEN_NARRATOR);
        state.hubExtraLines = [];
        state.hubMidBlock   = null;
      }

      if (elapsed >= CONFIG.ACT6_FINALE_START_MS && !state.act6FinaleStartTime) {
        state.act6FinaleStartTime = timestamp;
      }
      if (state.act6FinaleStartTime) {
        const ft = clamp((timestamp - state.act6FinaleStartTime) / CONFIG.ACT6_FINALE_FADE_MS, 0, 1);
        state.hubMidBlock = {
          line1: CONFIG.ACT6_FINALE_LINE1,
          line2: CONFIG.ACT6_FINALE_LINE2,
          alpha: easeInOut(ft)
        };
      }

      drawStone(state.origin.x, state.origin.y, scaled(CONFIG.STONE_RADIUS), CONFIG.COLOR_STONE_ACCENT);
      drawStoneGlow(state.origin.x, state.origin.y, CONFIG.STONE_GLOW_RINGS);

      if (elapsed >= 1000 && !state.act6RingStartTime) {
        state.act6RingStartTime = timestamp;
      }
      if (state.act6RingStartTime) {
        const ringElapsed   = timestamp - state.act6RingStartTime;
        const stopRadius    = scaled(CONFIG.ACT6_RING_STOP_RADIUS);
        const currentRadius = Math.min(ringElapsed / 3000 * stopRadius, stopRadius);
        const ringAlpha     = currentRadius >= stopRadius
          ? 0.3 + 0.2 * Math.sin(timestamp / 600)
          : CONFIG.RING_GEN1_START_ALPHA;
        drawGlowRing({
          x:             state.origin.x,
          y:             state.origin.y,
          generation:    1,
          currentRadius: currentRadius,
          currentAlpha:  ringAlpha,
          startAlpha:    CONFIG.RING_GEN1_START_ALPHA
        });
      }

      const fadeOutTrigger = CONFIG.ACT6_DURATION - 1500;
      if (elapsed >= fadeOutTrigger && !state.act6FadeOutStartTime) {
        state.act6FadeOutStartTime = timestamp;
      }
      if (state.act6FadeOutStartTime) {
        const fadeT       = clamp((timestamp - state.act6FadeOutStartTime) / 1500, 0, 1);
        state.globalAlpha = lerp(1, 0, fadeT);
      }

      if (elapsed >= CONFIG.ACT6_DURATION) {
        resetAllState();
      }
    }

    // ============================================================
    // Full state reset for clean loop
    // ============================================================
    function resetAllState() {
      state.currentAct          = 1;
      state.actStartTime        = null;
      state.transitioning       = false;
      state.transitionStartTime = null;
      state.transitionTargetAct = 1;
      state.globalAlpha         = 1;

      state.rings        = [];
      state.pulses       = [];
      state.ghostTraces  = [];
      ringIdCounter      = 0;

      state.act1CounterKickoff = false;
      state.act1RingSpawned = false;
      state.act2RingSpawned = false;
      state.act5RingSpawned = false;
      state.act4InwardBurstFired = false;
      state.act5ChaosStartTime = null;
      state.act5ExplosiveFired = false;
      state.act5QuestionPhase = false;
      state.act5FinalNarratorDone = false;

      state.act2Points_canvas   = [];
      state.act3Points_canvas   = [];
      state.act4Points_canvas   = [];
      state.act4ClimaxVisible   = false;
      state.act4ClimaxAlpha     = 0;
      state.act4ClimaxStartTime = null;

      state.counterDisplayValue = 0;
      state.counterAnimating    = false;
      state.counterPulseAlpha   = 1;

      state.textAct1      = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.textAct6Line1 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.textAct6Line2 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };
      state.textAct6Line3 = { visible: false, alpha: 0, startTime: null, duration: CONFIG.TEXT_FADE_DURATION };

      state.childVisible       = false;
      state.childAlpha         = 0;
      state.childFadeStartTime = null;
      state.childStoneDropped  = false;
      state.childTextVisible   = false;
      state.childTextAlpha     = 0;
      state.childTextStartTime = null;

      state.act6RingStartTime    = null;
      state.act6FadeOutStartTime = null;
      state.act6FinaleStartTime  = null;

      state.hubExtraLines = [];
      state.hubMidBlock   = null;

      // Layer 2 narrator reset
      state.narratorCurrentText = '';
      state.narratorPendingText = '';
      state.narratorAlpha       = 0;
      state.narratorTargetAlpha = 0;
      state.narratorPendingSet  = false;
      state.narratorSetForAct   = false;

      // Layer 3 Phase 1 reset
      state.layer3SpawnBaseTime = null;
      state.layer3Origins = null;
      state.layer3DeferDrawOneFrame = false;

      // Layer 2 freeze reset
      state.cinematicFreeze = false;
      state.freezeStartTime = null;
      state.freezeFired     = false;
      state.freezeLines.forEach(line => { line.alpha = 0; line.triggered = false; });
    }

    function attachUiControls() {
      const replayBtn = document.getElementById('ripple-replay-btn');
      if (!replayBtn) return;
      replayBtn.addEventListener('click', () => {
        resetAllState();
      });
    }

    // ============================================================
    // Main animation loop — Layer 2 call order
    // ============================================================
    function animate(timestamp) {
      if (!state.actStartTime) state.actStartTime = timestamp;

      updateCounter(timestamp);
      updateTextFades(timestamp);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawVignette();

      updateNarratorAlpha();

      processTransition(timestamp);

      if (!state.actStartTime) state.actStartTime = timestamp;
      const elapsed = timestamp - state.actStartTime;

      updateAndDrawRings(timestamp);

      drawCpftOutsideDim();
      drawCpftOutlineOnly();

      switch (state.currentAct) {
        case 1: runAct1(elapsed, timestamp); break;
        case 2: runAct2(elapsed, timestamp); break;
        case 3: runAct3(elapsed, timestamp); break;
        case 4: runAct4(elapsed, timestamp); break;
        case 5: runAct5(elapsed, timestamp); break;
        case 6: runAct6(elapsed, timestamp); break;
      }

      drawCpftNodeEmphasis();

      // Cinematic freeze overlay and text — drawn after act content, before narrator
      updateAndDrawCinematicFreeze(timestamp);

      // Layer 3 Phase 1 — update every frame; first paint deferred one frame after freeze so dots are not drawn over the freeze overlay
      if (state.currentAct === 5) {
        updateLayer3Phase1Origins(timestamp);
        drawLayer3Phase1Origins(timestamp);
      }

      // Opaque hub: £ + narrator + consolidated detail — drawn last so nothing sits on top
      drawHubPanel(timestamp);

      // Black overlay for transition fades and Act 6 fade-out
      if (state.globalAlpha < 1) {
        ctx.save();
        ctx.globalAlpha = 1 - state.globalAlpha;
        ctx.fillStyle   = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      requestAnimationFrame(animate);
    }

    // ============================================================
    // Initialise canvas, vignette, and start the animation
    // ============================================================
    function init() {
      resizeCanvas();
      loadCpftMap();
      attachUiControls();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(init);
    } else {
      setTimeout(init, 500);
    }
  </script>
</body>
</html>

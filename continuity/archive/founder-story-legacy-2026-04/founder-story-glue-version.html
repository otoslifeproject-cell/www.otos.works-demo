<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OTOS Journey Map</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#f4f5f7;
overflow:hidden;
}

.header{
padding:20px 30px;
display:flex;
align-items:center;
justify-content:space-between;
}

.title{
font-family:"Playfair Display";
font-size:22px;
}

.frame{
position:absolute;
top:80px;
bottom:0;
left:0;
right:0;
}

svg{
width:100%;
height:100%;
}

.pin{
fill:#ff5c5c;
}

.pinText{
fill:white;
font-size:10px;
font-weight:600;
text-anchor:middle;
}

.road{
stroke:#3c4047;
stroke-width:48;
fill:none;
stroke-linecap:round;
}

.roadCenter{
stroke:#ffd400;
stroke-width:5;
stroke-dasharray:12 12;
fill:none;
}

.roadGlow{
stroke:rgba(255,138,0,0.25);
stroke-width:72;
fill:none;
stroke-linecap:round;
}

.foot{
fill:#111;
opacity:.8;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Founder Journey — System Reality
</div>

<div>
Continuity Model Demonstration
</div>

</div>

<div class="frame">

<svg viewBox="0 0 1200 720">

<g id="roadLayer"></g>
<g id="pinLayer"></g>
<g id="footLayer"></g>

</svg>

</div>

<script>

const svg = document.querySelector("svg")
const roadLayer = document.getElementById("roadLayer")
const pinLayer = document.getElementById("pinLayer")
const footLayer = document.getElementById("footLayer")

/* -----------------------------
ROAD GEOMETRY
----------------------------- */

const roadPoints = [

{x:100,y:150},
{x:250,y:120},
{x:350,y:220},
{x:500,y:160},
{x:650,y:260},
{x:800,y:200},
{x:900,y:320},
{x:1020,y:380},
{x:1100,y:500}

]

let d = `M ${roadPoints[0].x} ${roadPoints[0].y}`

for(let i=1;i<roadPoints.length;i++){

let p = roadPoints[i]

d += ` Q ${(roadPoints[i-1].x+p.x)/2} ${(roadPoints[i-1].y+p.y)/2} ${p.x} ${p.y}`

}

/* -----------------------------
ROAD DRAW
----------------------------- */

const glow = document.createElementNS("http://www.w3.org/2000/svg","path")
glow.setAttribute("d",d)
glow.setAttribute("class","roadGlow")

const road = document.createElementNS("http://www.w3.org/2000/svg","path")
road.setAttribute("d",d)
road.setAttribute("class","road")

const centre = document.createElementNS("http://www.w3.org/2000/svg","path")
centre.setAttribute("d",d)
centre.setAttribute("class","roadCenter")

roadLayer.appendChild(glow)
roadLayer.appendChild(road)
roadLayer.appendChild(centre)

/* -----------------------------
STOPS
----------------------------- */

const roadLength = road.getTotalLength()

for(let i=0;i<35;i++){

let p = road.getPointAtLength(
(i/35)*roadLength
)

const g = document.createElementNS("http://www.w3.org/2000/svg","g")

const c = document.createElementNS("http://www.w3.org/2000/svg","circle")
c.setAttribute("cx",p.x)
c.setAttribute("cy",p.y)
c.setAttribute("r",14)
c.setAttribute("class","pin")

const t = document.createElementNS("http://www.w3.org/2000/svg","text")
t.setAttribute("x",p.x)
t.setAttribute("y",p.y+4)
t.setAttribute("class","pinText")
t.textContent=i+1

g.appendChild(c)
g.appendChild(t)

pinLayer.appendChild(g)

}

/* -----------------------------
FOOTPRINT WALKERS
----------------------------- */

let walkers=[]

function spawnWalker(){

const g = document.createElementNS("http://www.w3.org/2000/svg","g")

const left = document.createElementNS("http://www.w3.org/2000/svg","ellipse")
left.setAttribute("rx",4)
left.setAttribute("ry",8)
left.setAttribute("class","foot")

const right = document.createElementNS("http://www.w3.org/2000/svg","ellipse")
right.setAttribute("cx",10)
right.setAttribute("rx",4)
right.setAttribute("ry",8)
right.setAttribute("class","foot")

g.appendChild(left)
g.appendChild(right)

footLayer.appendChild(g)

walkers.push({
el:g,
pos:0,
speed:.5+Math.random()
})

}

function animate(){

const L = road.getTotalLength()

walkers.forEach(w=>{

w.pos += w.speed

if(w.pos>L) w.pos=0

const p = road.getPointAtLength(w.pos)

w.el.setAttribute("transform",`translate(${p.x},${p.y})`)

})

requestAnimationFrame(animate)

}

function growTraffic(){

spawnWalker()

if(walkers.length<80){

setTimeout(growTraffic,900)

}

}

animate()
growTraffic()

</script>

</body>
</html>

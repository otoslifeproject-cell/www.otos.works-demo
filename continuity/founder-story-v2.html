  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #0f172a;
      overflow: hidden;
      background: #f8f8f6;
    }

    /* ZONE A — Main canvas (left 58%, full height) */
    .zone-canvas {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(58vw, calc(100vw - 280px));
      background: #f8f8f6;
      overflow: hidden;
    }

    /* Stage 2 — node map */
    .node-map {
      position: absolute;
      inset: 0;
    }

    .node-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .node {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transition: all 300ms ease;
      z-index: 1;
    }

    .node img {
      max-width: 60px;
      max-height: 40px;
      object-fit: contain;
      opacity: 0.5;
      transition: opacity 300ms;
      display: block;
    }

    .node-unvisited {
      opacity: 0.8;
      transform: scale(0.92);
    }

    .node-active {
      border: 3px solid #ff8a00;
      box-shadow: 0 0 0 6px rgba(255, 138, 0, 0.15);
      transform: scale(1.15);
    }

    .node-active img {
      opacity: 1;
    }

    .node-visited {
      border: 2px solid #374151;
    }

    .node-visited img {
      opacity: 0.85;
    }

    .node-revisited {
      border: 3px solid #374151;
      box-shadow: 0 0 0 4px rgba(55, 65, 81, 0.12);
      transform: scale(1.08);
    }

    .node-cracked {
      border: 3px solid #ff8a00;
      background: linear-gradient(135deg, rgba(255, 138, 0, 0.08), white);
      box-shadow:
        0 0 0 6px rgba(255, 138, 0, 0.15),
        0 0 20px rgba(255, 138, 0, 0.2);
      animation: pulse-crack 2s ease-in-out infinite;
    }

    @keyframes pulse-crack {
      0%   { box-shadow: 0 0 0 6px rgba(255,138,0,0.15), 0 0 20px rgba(255,138,0,0.2); }
      50%  { box-shadow: 0 0 0 10px rgba(255,138,0,0.25), 0 0 32px rgba(255,138,0,0.35); }
      100% { box-shadow: 0 0 0 6px rgba(255,138,0,0.15), 0 0 20px rgba(255,138,0,0.2); }
    }

    .node-resolved {
      border: 3px solid #ff8a00;
      background: linear-gradient(135deg, rgba(255, 138, 0, 0.12), white);
    }

    .node-resolved img {
      opacity: 1;
    }

    .line-travelled {
      stroke: #374151;
      stroke-width: 3;
    }

    .line-orange {
      stroke: #ff8a00;
      stroke-width: 3;
      filter: drop-shadow(0 0 4px rgba(255, 138, 0, 0.5));
    }

    /* ZONE B — Story panel (bottom left) */
    .zone-story {
      position: fixed;
      left: 32px;
      bottom: 32px;
      width: 340px;
      height: 220px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      padding: 28px;
      overflow: hidden;
    }

    .panel-fade {
      opacity: 1;
      transition: opacity 250ms ease;
    }

    .panel-fade.is-fading {
      opacity: 0;
    }

    #storyOrg {
      font-family: "Playfair Display", serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 8px;
    }

    body.post-diagnosis #storyOrg {
      color: #ff8a00;
    }

    #storyTitle {
      font-family: "Inter", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(15, 23, 42, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    #storyDesc {

      font-size: 0.92rem;
      line-height: 1.6;
      color: rgba(15, 23, 42, 0.75);
    }

    /* ZONE C — Cost panel (right side) */
    .zone-cost {
      position: fixed;
      right: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid rgba(15, 23, 42, 0.08);
      padding: 32px 28px;
      overflow: hidden;
    }

    #costPhase {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-family: "Inter", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 138, 0, 0.14);
      color: #ff8a00;
      margin-bottom: 18px;
    }

    #costRunningLabel {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(15, 23, 42, 0.45);
      margin-bottom: 4px;
    }

    #costRunningTotal {
      font-family: "Playfair Display", serif;
      font-size: 3rem;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    #costStepTitle {
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      margin: 24px 0 4px;
    }

    #costOrg {
      font-size: 0.8rem;
      color: #ff8a00;
      font-weight: 500;
      margin-bottom: 12px;
    }

    #costDesc {
      font-size: 0.88rem;
      line-height: 1.6;
      color: rgba(15, 23, 42, 0.72);
    }

    /* Navigation bar */
    .nav {
      position: fixed;
      right: 32px;
      bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .nav .btn,

      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      line-height: 1;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 8px 20px;
      color: #0f172a;
      user-select: none;
    }

    .nav .btn {
      cursor: pointer;
    }

    .nav .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    /* Stage 6 — phase labels, progress bar, OTOS mark */
    .phase-pill-canvas {
      position: absolute;
      font-family: Inter, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.1);
      color: rgba(15, 23, 42, 0.5);
      pointer-events: none;
      z-index: 2;
    }

    .phase-pill-canvas.phase-3 {
      color: #ff8a00;

    }

    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #e5e7eb;
      z-index: 20;
    }

    .progress .fill {
      height: 100%;

      background: linear-gradient(to right, #374151, #ff8a00);

    .otos-mark {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
      z-index: 2;

    }

    .otos-mark .word {
      font-family: Inter, sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
  </style>

  <script>
    (function () {
      "use strict";

      var svg = document.getElementById("nodeLines");
      var layer = document.getElementById("lineLayer");
      var nodes = Array.prototype.slice.call(document.querySelectorAll(".node-map .node"));
      if (!svg || !layer || nodes.length < 2) return;

      function pctToViewBox(pct) {
        return (pct / 100) * 1000;
      }

      function parsePct(value) {
        if (!value) return 0;
        var n = parseFloat(String(value).replace("%", ""));
        return Number.isFinite(n) ? n : 0;
      }

      function draw() {
        layer.innerHTML = "";
        for (var i = 0; i < nodes.length - 1; i++) {
          var a = nodes[i];
          var b = nodes[i + 1];
          var leftA = parsePct(a.style.left);
          var topA = parsePct(a.style.top);
          var leftB = parsePct(b.style.left);
          var topB = parsePct(b.style.top);

          var x1 = pctToViewBox(leftA) + 40;
          var y1 = pctToViewBox(topA) + 40;
          var x2 = pctToViewBox(leftB) + 40;
          var y2 = pctToViewBox(topB) + 40;

          var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("data-line-index", String(i));
          line.setAttribute("x1", String(x1));
          line.setAttribute("y1", String(y1));
          line.setAttribute("x2", String(x2));
          line.setAttribute("y2", String(y2));
          layer.appendChild(line);
        }
      }

      draw();
      window.addEventListener("resize", draw);
    })();
  </script>

      function phaseForStepIndex(i) {
        if (i <= 17) return 1;
        if (i <= 35) return 2;
        if (i <= 45) return 3;
        return 4;
      }

      function nodeIndexForOrg(org) {
        var s = String(org || "").toLowerCase();
        if (s.indexOf("self") !== -1 || s.indexOf("undiagnosed") !== -1) return 19;
        if (s.indexOf("family") !== -1) return 18;
        if (s.indexOf("gp") !== -1) return 17;
        if (s.indexOf("psymplicity") !== -1) return 2;
        if (s.indexOf("cgl") !== -1) return 3;
        if (s.indexOf("northampton") !== -1) return 4;
        if (s.indexOf("nightingale") !== -1) return 5;
        if (s.indexOf("help") !== -1) return 6;
        if (s.indexOf("workwell") !== -1) return 7;
        if (s.indexOf("mind") !== -1) return 8;
        if (s.indexOf("jo fenton") !== -1) return 9;
        if (s.indexOf("adhd") !== -1) return 10;
        if (s.indexOf("crs") !== -1 || s.indexOf("cambridge recovery") !== -1) return 11;
        if (s.indexOf("police") !== -1) return 12;
        if (s.indexOf("court") !== -1 || s.indexOf("hm courts") !== -1) return 13;
        if (s.indexOf("probation") !== -1) return 14;
        if (s.indexOf("castle craig") !== -1) return 15;
        if (s.indexOf("sun") !== -1) return 16;
        if (s.indexOf("cpft") !== -1) return 0;
        if (s.indexOf("addenbrookes") !== -1 || s.indexOf("a&e") !== -1 || s.indexOf("icu") !== -1) return 1;
        return 0;
      }

      var NODE_ORG_MAP = {
        0: "CPFT",
        1: "Addenbrookes",
        2: "Psymplicity",
        3: "CGL",
        4: "Northampton",
        5: "Nightingale",
        6: "Help Me Stop",
        7: "WorkWell",
        8: "MIND",
        9: "Jo Fenton",
        10: "CPFT ADHD Team",
        11: "CRS",
        12: "Police",
        13: "HM Courts",
        14: "Probation",
        15: "Castle Craig",
        16: "SUN Network",
        17: "GP",
        18: "Family",
        19: "Self / Undiagnosed"
      };

      var STEPS = RAW_STEPS.map(function (s, i) {
        return {
          index: i,
          stepId: s.id,
          title: s.title,
          org: s.org,
          description: s.description,
          cost: Number(s.cost) || 0,
          phase: phaseForStepIndex(i),
          nodeIndex: nodeIndexForOrg(s.org)
        };
      });

      var state = {
        currentStep: 0,
        nodeVisitCounts: new Array(20).fill(0),
        runningCost: 0,
        prevNodeIndex: null,
        currentStepNodeIndex: 0
      };

      var btnNext = document.getElementById("btnNext");
      var btnBack = document.getElementById("btnBack");
      var stepCounter = document.getElementById("stepCounter");
      var progressFill = document.getElementById("progressFill");

      var storyOrg = document.getElementById("storyOrg");
      var storyTitle = document.getElementById("storyTitle");
      var storyDesc = document.getElementById("storyDesc");
      var storyPanel = document.getElementById("storyPanel");

      var costPhase = document.getElementById("costPhase");
      var costRunningLabel = document.getElementById("costRunningLabel");
      var costRunningTotal = document.getElementById("costRunningTotal");
      var costStepTitle = document.getElementById("costStepTitle");
      var costOrg = document.getElementById("costOrg");
      var costDesc = document.getElementById("costDesc");
      var costPanel = document.getElementById("costPanel");

      var nodeEls = Array.prototype.slice.call(document.querySelectorAll(".node-map .node"));
      var lineEls = Array.prototype.slice.call(document.querySelectorAll("#lineLayer line"));

      function fmtGBP(n) {
        return n === 0 ? "£0" : "£" + Number(n).toLocaleString("en-GB");
      }

      function applyNodeClass(nodeEl, className) {
        if (!nodeEl) return;
        nodeEl.classList.remove(
          "node-unvisited",
          "node-active",
          "node-visited",
          "node-revisited",
          "node-cracked",
          "node-resolved"
        );
        nodeEl.classList.add(className);
      }

      function updateLineStates(n) {
        var isPost = n >= 36;
        for (var i = 0; i < lineEls.length; i++) {
          var line = lineEls[i];
          line.classList.remove("line-travelled", "line-orange");
          if (i <= state.currentStepNodeIndex - 1) {
            line.classList.add(isPost ? "line-orange" : "line-travelled");
          }
        }
      }

      function phaseLabel(phase) {
        if (phase === 1) return "Phase 1";
        if (phase === 2) return "Phase 2";
        if (phase === 3) return "Phase 3";
        return "Phase 4";
      }

      function crossfadePanels(update) {
        if (!storyPanel || !costPanel) {
          update();
          return;
        }
        storyPanel.classList.add("is-fading");
        costPanel.classList.add("is-fading");
        window.setTimeout(function () {
          update();
          requestAnimationFrame(function () {
            storyPanel.classList.remove("is-fading");
            costPanel.classList.remove("is-fading");
          });
        }, 1);
      }

      function goToStep(n) {
        if (n < 0 || n > 72) return;

        // Recompute state deterministically for correct back/forward behavior
        var running = 0;
        var counts = new Array(20).fill(0);
        var i;
        for (i = 0; i <= n; i++) {
          running += STEPS[i].cost;
          counts[STEPS[i].nodeIndex] += 1;
        }
        state.currentStep = n;
        state.runningCost = running;
        state.nodeVisitCounts = counts;

        var nodeIndex = STEPS[n].nodeIndex;
        state.currentStepNodeIndex = nodeIndex;

        var isPostDiagnosis = n >= 36;
        document.body.classList.toggle("post-diagnosis", isPostDiagnosis);

        // Update node states
        for (var i = 0; i < nodeEls.length; i++) {
          var idx = Number(nodeEls[i].getAttribute("data-node-index"));
          var visits = state.nodeVisitCounts[idx];
          if (!visits) {
            applyNodeClass(nodeEls[i], "node-unvisited");
            continue;
          }

          if (isPostDiagnosis && idx === nodeIndex) {
            applyNodeClass(nodeEls[i], "node-active");
            continue;
          }

          if (isPostDiagnosis && visits >= 3) {
            applyNodeClass(nodeEls[i], "node-resolved");
          } else if (visits >= 3) {
            applyNodeClass(nodeEls[i], "node-cracked");
          } else if (visits === 2) {
            applyNodeClass(nodeEls[i], "node-revisited");
          } else {
            applyNodeClass(nodeEls[i], "node-visited");
          }
        }

        // Ensure current is active
        var currentNodeEl = nodeEls[nodeIndex];
        if (currentNodeEl) {
          currentNodeEl.classList.add("node-active");
        }

        // Update lines
        updateLineStates(n);

        crossfadePanels(function () {
          // Update panels
          var step = STEPS[n];
          storyOrg.textContent = NODE_ORG_MAP[nodeIndex] || step.org;
          storyTitle.textContent = step.title;
          storyDesc.textContent = step.description;

          costPhase.textContent = phaseLabel(step.phase);
          costRunningLabel.textContent = "Running total (known costs)";
          costRunningTotal.textContent = fmtGBP(state.runningCost);
          costStepTitle.textContent = step.title;
          costOrg.textContent = step.org;
          costDesc.textContent = step.description;

          // Step counter and buttons
          stepCounter.textContent = "Step " + step.stepId + " / 72";
          btnBack.disabled = n === 0;
          btnNext.disabled = n === 72;
        });

        if (progressFill) {
          var pct = (n / 72) * 100;
          progressFill.style.width = pct + "%";
        }
      }

      btnNext.addEventListener("click", function () {
        goToStep(state.currentStep + 1);
      });

      btnBack.addEventListener("click", function () {
        goToStep(state.currentStep - 1);
      });

      document.addEventListener("keydown", function (e) {
        if (e.repeat) return;
        if (e.key === "ArrowRight") goToStep(state.currentStep + 1);
        if (e.key === "ArrowLeft") goToStep(state.currentStep - 1);
      });

      // Initial paint
      goToStep(0);
    })();
  </script>

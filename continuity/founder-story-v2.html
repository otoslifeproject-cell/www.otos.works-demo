<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder story v2 — OTOS Continuity</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #0f172a;
      overflow: hidden;
      background: #f8f8f6;
    }

    /* ZONE A — Main canvas (left 58%, full height) */
    .zone-canvas {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: min(58vw, calc(100vw - 280px));
      background: #f8f8f6;
      overflow: hidden;
    }

    /* Stage 2 — node map */
    .node-map {
      position: absolute;
      inset: 0;
    }

    .node-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .node {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transition: all 300ms ease;
      z-index: 1;
    }

    .node img {
      max-width: 60px;
      max-height: 40px;
      object-fit: contain;
      opacity: 0.5;
      transition: opacity 300ms;
      display: block;
    }

    /* ZONE B — Story panel (bottom left) */
    .zone-story {
      position: fixed;
      left: 32px;
      bottom: 32px;
      width: 340px;
      height: 220px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      padding: 28px;
      overflow: hidden;
    }

    /* ZONE C — Cost panel (right side) */
    .zone-cost {
      position: fixed;
      right: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid rgba(15, 23, 42, 0.08);
      padding: 32px 28px;
      overflow: hidden;
    }

    /* Navigation bar */
    .nav {
      position: fixed;
      right: 32px;
      bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .nav .btn,
    .nav .counter {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      line-height: 1;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 8px 20px;
      color: #0f172a;
      user-select: none;
    }

    .nav .btn {
      cursor: pointer;
    }

    .nav .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <main class="zone-canvas" aria-label="Node map canvas">
    <div class="node-map" id="nodeMap">
      <svg class="node-lines" id="nodeLines" viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true">
        <g id="lineLayer" stroke="#e5e7eb" stroke-width="2" fill="none"></g>
      </svg>

      <div class="node" data-org="CPFT" data-node-index="0" style="left:8%; top:12%;">
        <img src="/assets/partners/NHS_CPFT_Logo.png" alt="CPFT" />
      </div>
      <div class="node" data-org="Addenbrookes" data-node-index="1" style="left:22%; top:10%;">
        <img src="/assets/partners/Addenbrookes_Logo.png" alt="Addenbrookes" />
      </div>
      <div class="node" data-org="Psymplicity" data-node-index="2" style="left:38%; top:8%;">
        <img src="/assets/partners/Psymplicity_Logo.png" alt="Psymplicity" />
      </div>
      <div class="node" data-org="CGL" data-node-index="3" style="left:52%; top:12%;">
        <img src="/assets/partners/CGL_Logo.png" alt="CGL" />
      </div>
      <div class="node" data-org="Northampton" data-node-index="4" style="left:65%; top:10%;">
        <img src="/assets/founders/Northampton_Logo.png" alt="Northampton" />
      </div>
      <div class="node" data-org="Nightingale" data-node-index="5" style="left:55%; top:25%;">
        <img src="/assets/founders/Nightingale_Logo.png" alt="Nightingale" />
      </div>
      <div class="node" data-org="Help Me Stop" data-node-index="6" style="left:42%; top:28%;">
        <img src="/assets/founders/Help_Me_Stop_Logo.png" alt="Help Me Stop" />
      </div>
      <div class="node" data-org="WorkWell" data-node-index="7" style="left:28%; top:30%;">
        <img src="/assets/partners/WorkWell_Logo.png" alt="WorkWell" />
      </div>
      <div class="node" data-org="MIND" data-node-index="8" style="left:15%; top:35%;">
        <img src="/assets/partners/MIND_Logo.png" alt="MIND" />
      </div>
      <div class="node" data-org="Jo Fenton" data-node-index="9" style="left:8%; top:48%;">
        <img src="/assets/partners/Jo_Fenton_Logo.png" alt="Jo Fenton" />
      </div>
      <div class="node" data-org="ADHD Team" data-node-index="10" style="left:18%; top:55%;">
        <img src="/assets/partners/ADHD_Team_Logo.png" alt="ADHD Team" />
      </div>
      <div class="node" data-org="CRS" data-node-index="11" style="left:32%; top:52%;">
        <img src="/assets/partners/CRS_Logo.png" alt="CRS" />
      </div>
      <div class="node" data-org="Police" data-node-index="12" style="left:45%; top:50%;">
        <img src="/assets/founders/Police_Logo.jpeg" alt="Police" />
      </div>
      <div class="node" data-org="Courts" data-node-index="13" style="left:58%; top:48%;">
        <img src="/assets/founders/HM_Courts_Logo.png" alt="Courts" />
      </div>
      <div class="node" data-org="Probation" data-node-index="14" style="left:65%; top:58%;">
        <img src="/assets/founders/Probation_Logo.png" alt="Probation" />
      </div>
      <div class="node" data-org="Castle Craig" data-node-index="15" style="left:52%; top:65%;">
        <img src="/assets/founders/Castle_Craig_Logo.png" alt="Castle Craig" />
      </div>
      <div class="node" data-org="SUN Network" data-node-index="16" style="left:38%; top:68%;">
        <img src="/assets/partners/SUN_Network_Logo.png" alt="SUN Network" />
      </div>
      <div class="node" data-org="GP (Cambridge)" data-node-index="17" style="left:22%; top:72%;">
        <img src="/assets/partners/NHS_CPFT_Logo.png" alt="GP (Cambridge)" />
      </div>
      <div class="node" data-org="Family" data-node-index="18" style="left:35%; top:80%;">
        <img src="/assets/partners/NHS_CPFT_Logo.png" alt="Family" />
      </div>
      <div class="node" data-org="Self / Undiagnosed" data-node-index="19" style="left:50%; top:82%;">
        <img src="/assets/partners/NHS_CPFT_Logo.png" alt="Self / Undiagnosed" />
      </div>
    </div>
  </main>

  <aside class="zone-story" aria-label="Story panel"></aside>

  <aside class="zone-cost" aria-label="Cost panel"></aside>

  <nav class="nav" aria-label="Step navigation">
    <button class="btn" type="button" id="btnBack" disabled>Back</button>
    <div class="counter" id="stepCounter">Step 1 / 72</div>
    <button class="btn" type="button" id="btnNext">Next</button>
  </nav>

  <script>
    (function () {
      "use strict";

      var svg = document.getElementById("nodeLines");
      var layer = document.getElementById("lineLayer");
      var nodes = Array.prototype.slice.call(document.querySelectorAll(".node-map .node"));
      if (!svg || !layer || nodes.length < 2) return;

      function pctToViewBox(pct) {
        return (pct / 100) * 1000;
      }

      function parsePct(value) {
        if (!value) return 0;
        var n = parseFloat(String(value).replace("%", ""));
        return Number.isFinite(n) ? n : 0;
      }

      function draw() {
        layer.innerHTML = "";
        for (var i = 0; i < nodes.length - 1; i++) {
          var a = nodes[i];
          var b = nodes[i + 1];
          var leftA = parsePct(a.style.left);
          var topA = parsePct(a.style.top);
          var leftB = parsePct(b.style.left);
          var topB = parsePct(b.style.top);

          var x1 = pctToViewBox(leftA) + 40;
          var y1 = pctToViewBox(topA) + 40;
          var x2 = pctToViewBox(leftB) + 40;
          var y2 = pctToViewBox(topB) + 40;

          var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", String(x1));
          line.setAttribute("y1", String(y1));
          line.setAttribute("x2", String(x2));
          line.setAttribute("y2", String(y2));
          layer.appendChild(line);
        }
      }

      draw();
      window.addEventListener("resize", draw);
    })();
  </script>
</body>
</html>

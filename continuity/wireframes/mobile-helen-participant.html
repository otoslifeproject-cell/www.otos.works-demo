<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bedside / alcohol liaison — Participant found (Wireframe 2)</title>
  <link rel="stylesheet" href="otos-design-system.css">
  <link rel="stylesheet" href="wireframe-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .device-frame { width: 393px; height: 852px; margin: 0 auto; background: #000; border-radius: 55px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .device-screen { width: 100%; height: 100%; background: var(--bg-page); border-radius: 45px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 125px; height: 34px; background: #000; border-radius: 0 0 20px 20px; z-index: 10; }
    .safe-top { height: 44px; flex-shrink: 0; }
    .safe-bottom { height: 34px; flex-shrink: 0; }
    .mobile-header { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-light); background: rgba(255,252,246,0.6); }
    .mobile-header .logo { font-weight: 700; font-size: 0.9375rem; color: var(--brand-primary); }
    .mobile-header .role { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
    .mobile-main { flex: 1; padding: var(--space-5); }
    .mobile-main h1 { font-size: 1.125rem; margin: 0 0 var(--space-4); }
    .participant-card { background: var(--bg-panel); border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-5); border: 1px solid rgba(193,127,36,0.12); box-shadow: 0 4px 16px rgba(26,20,16,0.04); }
    .participant-card h2 { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 var(--space-3); }
    .participant-card .row { display: flex; justify-content: space-between; margin-bottom: var(--space-2); font-size: var(--text-sm); gap: var(--space-3); }
    .participant-card .row:last-child { margin-bottom: 0; }
    .participant-card .label { color: var(--text-muted); }
    .participant-card .code { font-weight: 600; letter-spacing: 0.05em; color: var(--brand-primary); }
    .btn--full { width: 100%; padding: 16px 24px; min-height: 48px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="wf-page">
  <div class="device-frame">
    <div class="device-screen">
      <div class="notch" aria-hidden="true"></div>
      <div class="safe-top"></div>
      <div class="wf-statusbar"><span class="wf-statusbar__time">11:04</span><span class="wf-statusbar__sig">5G ●●●</span></div>
      <p class="wf-step-label">Bedside handoff · Step 2 of 5</p>
      <div class="wf-progress" aria-label="Progress: step 2 of 5">
        <span class="wf-progress__dot is-done"></span><span class="wf-progress__dot is-active"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span>
      </div>
      <header class="mobile-header">
        <div class="logo">OTOS Continuity™</div>
        <div class="role">CPFT alcohol liaison · Addenbrooke&rsquo;s</div>
      </header>
      <main class="mobile-main">
        <h1>Participant found</h1>
        <div class="participant-card">
          <h2>Journey summary</h2>
          <div class="row"><span class="label">Name</span><span>Anonymous</span></div>
          <div class="row"><span class="label">Code</span><span class="code">XXXX-XXXX</span></div>
          <div class="row"><span class="label">Current status</span><span>Active</span></div>
          <div class="row"><span class="label">Last check-in</span><span>2 days ago</span></div>
        </div>
        <a href="mobile-helen-record.html" class="btn btn--primary btn--full">Record this touchpoint</a>
      </main>
      <div class="safe-bottom"></div>
    </div>
  </div>
  <nav class="wf-toolbar" aria-label="Screen navigation">
    <a class="wf-toolbar__link" href="index.html">Hub</a>
    <a class="wf-toolbar__link" href="flow-overview.html#flow-helen">Flow map</a>
    <span class="wf-toolbar__gap" aria-hidden="true"></span>
    <a class="wf-toolbar__btn wf-toolbar__btn--ghost" href="mobile-helen-scan.html">← Prev</a>
    <a class="wf-toolbar__btn" href="mobile-helen-record.html">Next →</a>
  </nav>
</body>
</html>

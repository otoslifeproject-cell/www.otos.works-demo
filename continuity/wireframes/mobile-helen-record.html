<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bedside / Helen view — Record touchpoint (Wireframe 2)</title>
  <link rel="stylesheet" href="otos-design-system.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .device-frame { width: 393px; height: 852px; margin: 0 auto; background: #000; border-radius: 55px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .device-screen { width: 100%; height: 100%; background: var(--bg-page); border-radius: 45px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 125px; height: 34px; background: #000; border-radius: 0 0 20px 20px; z-index: 10; }
    .safe-top { height: 50px; }
    .safe-bottom { height: 34px; }
    .mobile-header { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-light); }
    .mobile-header .logo { font-weight: 700; font-size: 0.9375rem; color: var(--otos-blue); }
    .mobile-main { flex: 1; padding: var(--space-5); overflow: auto; }
    .mobile-main h1 { font-size: 1.125rem; margin: 0 0 var(--space-4); }
    .touch-actions { display: flex; flex-direction: column; gap: var(--space-3); }
    .touch-btn { display: flex; align-items: center; gap: var(--space-3); width: 100%; padding: 16px 20px; text-align: left; font-family: var(--font-sans); font-size: var(--text-base); background: var(--bg-panel); border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; min-height: 52px; }
    .touch-btn:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }
    .touch-btn.selected { border-color: var(--otos-blue); background: var(--otos-blue-light); }
    .adhd-toggle { margin-top: var(--space-4); padding: var(--space-4); background: var(--bg-panel); border-radius: var(--radius-md); border: 1px solid var(--border); }
    .adhd-toggle label { display: flex; align-items: center; gap: var(--space-3); font-size: var(--text-sm); font-weight: 500; cursor: pointer; }
    .adhd-toggle input { width: 20px; height: 20px; }
    .adhd-note { font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-2); }
    .btn--full { width: 100%; padding: 16px 24px; min-height: 48px; margin-top: var(--space-5); }
  </style>
</head>
<body style="background: #e5e5e5; padding: 40px 0;">
  <div class="device-frame">
    <div class="device-screen">
      <div class="notch" aria-hidden="true"></div>
      <div class="safe-top"></div>
      <header class="mobile-header">
        <div class="logo">OTOS Continuity</div>
      </header>
      <main class="mobile-main">
        <h1>Record this touchpoint</h1>
        <div class="touch-actions">
          <button type="button" class="touch-btn selected">✓ Attended appointment</button>
          <button type="button" class="touch-btn">✓ Referred onward — where?</button>
          <button type="button" class="touch-btn">✓ Fast-track ADHD flag ← QbTest / RTC ready</button>
        </div>
        <div class="adhd-toggle">
          <label><input type="checkbox" checked> Fast-track ADHD flag raised?</label>
          <p class="adhd-note">QbTest pathway or Right to Choose (RTC) — one-tap referral</p>
        </div>
        <button type="button" class="btn btn--primary btn--full">Next step &amp; receipt</button>
      </main>
      <div class="safe-bottom"></div>
    </div>
  </div>
</body>
</html>

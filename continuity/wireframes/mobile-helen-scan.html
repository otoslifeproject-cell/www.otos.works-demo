<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bedside / alcohol liaison — Scan (Wireframe 2)</title>
  <link rel="stylesheet" href="otos-design-system.css">
  <link rel="stylesheet" href="wireframe-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .device-frame { width: 393px; height: 852px; margin: 0 auto; background: #000; border-radius: 55px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .device-screen { width: 100%; height: 100%; background: var(--bg-page); border-radius: 45px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 125px; height: 34px; background: #000; border-radius: 0 0 20px 20px; z-index: 10; }
    .safe-top { height: 44px; flex-shrink: 0; }
    .safe-bottom { height: 34px; flex-shrink: 0; }
    .mobile-header { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-light); background: rgba(255,252,246,0.6); }
    .mobile-header .logo { font-weight: 700; font-size: 0.9375rem; color: var(--brand-primary); letter-spacing: -0.02em; }
    .mobile-header .role { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
    .mobile-main { flex: 1; padding: var(--space-5); }
    .mobile-main h1 { font-size: 1.125rem; margin: 0 0 var(--space-4); }
    .scan-actions { display: flex; flex-direction: column; gap: var(--space-3); }
    .btn--full { width: 100%; padding: 16px 24px; min-height: 48px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .code-input { width: 100%; padding: 16px; font-size: 1.25rem; letter-spacing: 0.2em; text-align: center; border: 2px solid var(--border); border-radius: var(--radius-md); font-family: var(--font-sans); background: var(--bg-panel-elevated); }
    .code-input:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(193,127,36,0.15); }
    .code-input::placeholder { letter-spacing: 0.15em; color: var(--text-muted); }
    .or { text-align: center; font-size: var(--text-sm); color: var(--text-muted); margin: var(--space-2) 0; }
  </style>
</head>
<body class="wf-page">
  <div class="device-frame">
    <div class="device-screen">
      <div class="notch" aria-hidden="true"></div>
      <div class="safe-top"></div>
      <div class="wf-statusbar"><span class="wf-statusbar__time">11:04</span><span class="wf-statusbar__sig">5G ●●●</span></div>
      <p class="wf-step-label">Bedside handoff · Step 1 of 5</p>
      <div class="wf-progress" aria-label="Progress: step 1 of 5">
        <span class="wf-progress__dot is-active"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span>
      </div>
      <header class="mobile-header">
        <div class="logo">OTOS Continuity™</div>
        <div class="role">CPFT alcohol liaison · Addenbrooke&rsquo;s</div>
      </header>
      <main class="mobile-main">
        <h1>Scan participant QR or enter 8-digit code</h1>
        <div class="scan-actions">
          <a href="mobile-helen-participant.html" class="btn btn--primary btn--full">Scan QR code</a>
          <p class="or">or</p>
          <input type="text" class="code-input" placeholder="XXXX-XXXX" maxlength="9" aria-label="8-digit code">
          <a href="mobile-helen-participant.html" class="btn btn--secondary btn--full" style="text-decoration:none;">Look up code</a>
        </div>
      </main>
      <div class="safe-bottom"></div>
    </div>
  </div>
  <nav class="wf-toolbar" aria-label="Screen navigation">
    <a class="wf-toolbar__link" href="index.html">Hub</a>
    <a class="wf-toolbar__link" href="flow-overview.html#flow-helen">Flow map</a>
    <span class="wf-toolbar__gap" aria-hidden="true"></span>
    <span class="wf-toolbar__btn wf-toolbar__btn--ghost" style="opacity:0.45;pointer-events:none;">← Prev</span>
    <a class="wf-toolbar__btn" href="mobile-helen-participant.html">Next →</a>
  </nav>
</body>
</html>

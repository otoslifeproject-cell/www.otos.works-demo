<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>OTOS Continuity™ — Alert (Mobile)</title>
  <link rel="stylesheet" href="otos-design-system.css">
  <link rel="stylesheet" href="wireframe-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .device-frame {
      width: 393px;
      height: 852px;
      margin: 0 auto;
      background: #000;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .device-screen {
      width: 100%;
      height: 100%;
      background: var(--bg-page);
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 125px;
      height: 34px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }
    .safe-top { height: 50px; }
    .safe-bottom { height: 34px; }
    .mobile-header {
      padding: var(--space-4);
      border-bottom: 1px solid var(--border-light);
    }
    .mobile-header .logo { font-weight: 700; font-size: 1rem; color: var(--otos-blue); }
    .mobile-main { padding: var(--space-4); }
    .alert { margin-bottom: var(--space-4); }
    .mobile-main h1 { font-size: 1.125rem; margin-bottom: var(--space-2); }
    .mobile-main p { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-4); }
    .btn--full { width: 100%; padding: var(--space-4); margin-top: var(--space-2); }
  </style>
</head>
<body class="wf-page">
  <div class="device-frame">
    <div class="device-screen">
      <div class="notch" aria-hidden="true"></div>
      <div class="safe-top"></div>
      <header class="mobile-header">
        <div class="logo">OTOS Continuity™</div>
      </header>
      <main class="mobile-main">
        <div class="alert">
          <strong>Reminder</strong> — You haven’t checked in for a few days. A quick check-in helps your continuity record stay up to date.
        </div>
        <h1>We’re here if you need support</h1>
        <p>Your answers are private and only used to keep your journey connected. Tap below to do a quick check-in or dismiss.</p>
        <button type="button" class="btn btn--primary btn--full">Do check-in now</button>
        <button type="button" class="btn btn--secondary btn--full">Dismiss</button>
      </main>
      <div class="safe-bottom"></div>
    </div>
  </div>
  <nav class="wf-toolbar" aria-label="Screen navigation">
    <a class="wf-toolbar__link" href="index.html">Hub</a>
    <a class="wf-toolbar__link" href="flow-overview.html#flow-legacy">Flow map</a>
  </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Participant onboarding — First check-in (Wireframe 1)</title>
  <link rel="stylesheet" href="otos-design-system.css">
  <link rel="stylesheet" href="wireframe-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .device-frame { width: 393px; height: 852px; margin: 0 auto; background: #000; border-radius: 55px; padding: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .device-screen { width: 100%; height: 100%; background: var(--bg-page); border-radius: 45px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 125px; height: 34px; background: #000; border-radius: 0 0 20px 20px; z-index: 10; }
    .mobile-main { flex: 1; padding: var(--space-5); display: flex; flex-direction: column; }
    .mobile-main h1 { font-size: 1.25rem; margin: 0 0 var(--space-4); }
    .options { display: flex; flex-direction: column; gap: var(--space-3); }
    .option-btn { display: flex; align-items: center; justify-content: center; gap: var(--space-3); width: 100%; padding: 20px 24px; font-family: var(--font-sans); font-size: 1.125rem; background: var(--bg-panel); border: 2px solid var(--border); border-radius: var(--radius-md); cursor: pointer; min-height: 56px; }
    .option-btn:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }
    .option-btn.selected { border-color: var(--brand-primary); background: rgba(193,127,36,0.08); color: var(--text); font-weight: 600; }
    .option-btn .emoji { font-size: 1.5rem; }
    .btn--full { width: 100%; padding: 16px 24px; font-size: 1rem; min-height: 48px; margin-top: var(--space-4); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .help-link { display: block; margin-top: var(--space-4); font-size: var(--text-sm); color: var(--text-muted); }
    .safe-top { height: 44px; flex-shrink: 0; }
    .safe-bottom { height: 34px; flex-shrink: 0; }
  </style>
</head>
<body class="wf-page">
  <div class="device-frame">
    <div class="device-screen">
      <div class="notch" aria-hidden="true"></div>
      <div class="safe-top"></div>
      <div class="wf-statusbar"><span class="wf-statusbar__time">9:41</span><span class="wf-statusbar__sig">LTE ●●●</span></div>
      <p class="wf-step-label">Participant onboarding · Step 4 of 6</p>
      <div class="wf-progress" aria-label="Progress: step 4 of 6">
        <span class="wf-progress__dot is-done"></span><span class="wf-progress__dot is-done"></span><span class="wf-progress__dot is-done"></span><span class="wf-progress__dot is-active"></span><span class="wf-progress__dot"></span><span class="wf-progress__dot"></span>
      </div>
      <main class="mobile-main">
        <h1>How are you doing today?</h1>
        <div class="options" role="group" aria-label="Choose one">
          <button type="button" class="option-btn"><span class="emoji" aria-hidden="true">😔</span> Struggling</button>
          <button type="button" class="option-btn selected"><span class="emoji" aria-hidden="true">😐</span> OK</button>
          <button type="button" class="option-btn"><span class="emoji" aria-hidden="true">😊</span> Good</button>
        </div>
        <a href="mobile-onboarding-nextstep.html" class="btn btn--primary btn--full">Continue</a>
        <a href="index.html" class="help-link">I need help</a>
      </main>
      <div class="safe-bottom"></div>
    </div>
  </div>
  <nav class="wf-toolbar" aria-label="Screen navigation">
    <a class="wf-toolbar__link" href="index.html">Hub</a>
    <a class="wf-toolbar__link" href="flow-overview.html#flow-onboarding">Flow map</a>
    <span class="wf-toolbar__gap" aria-hidden="true"></span>
    <a class="wf-toolbar__btn wf-toolbar__btn--ghost" href="mobile-onboarding-id.html">← Prev</a>
    <a class="wf-toolbar__btn" href="mobile-onboarding-nextstep.html">Next →</a>
  </nav>
</body>
</html>

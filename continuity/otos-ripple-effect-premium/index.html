<!DOCTYPE html>
<!-- OTOS Ripple Cascade — otos-ripple-effect-premium/index.html -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OTOS Ripple Cascade</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --ripple-primary: #00c896;
      --ripple-secondary: #00a878;
      --ripple-outer: #007a58;
      --label-text: #ffffff;
      --label-bg: rgba(0, 200, 150, 0.12);
      --font-stack: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-stack);
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <canvas id="rippleCanvas" aria-hidden="true"></canvas>

  <script>
    (() => {
      "use strict";

      // Core canvas and rendering constants.
      const canvas = document.getElementById("rippleCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const BG_COLOR = "#0a0f1a";
      const RIPPLE_COLORS = ["#00c896", "#00a878", "#007a58"];
      const COST_LABEL_TEXT = "#ffffff";
      const COST_LABEL_BG = "rgba(0, 200, 150, 0.12)";
      const FLASH_BASE_COLOR = "#ffffff";
      const FONT_STACK = "system-ui, -apple-system, 'Segoe UI', sans-serif";

      // Hardcoded person categories used for cascade-generated impact points.
      const PERSON_TYPES = [
        { label: "Partner", costLabel: "£400-£900 / incident", tier: 1 },
        { label: "Child", costLabel: "£3,000-£8,000 / year", tier: 1 },
        { label: "GP", costLabel: "£480-£2,550 / year", tier: 1 },
        { label: "Police", costLabel: "£80-£400 / event", tier: 2 },
        { label: "Housing Officer", costLabel: "£8,000-£30,000 / case", tier: 2 },
        { label: "Keyworker", costLabel: "£1,200-£4,200 / year", tier: 2 },
        { label: "A&E Nurse", costLabel: "£450-£1,500 / attendance", tier: 3 },
        { label: "Probation Officer", costLabel: "£2,000-£6,000 / cycle", tier: 3 }
      ];

      // Short ambient cost facts that travel around ring edges.
      const COST_FACTS = [
        "A&E: £450-£1,500",
        "Detox: £3,000-£5,000",
        "Police: £80-£400",
        "Housing: £8,000-£30,000",
        "CAMHS: £800-£2,500",
        "Prison: £4,000-£15,000",
        "Lost productivity: £2k-£8k",
        "GP overload: £480-£2,550/yr",
        "Crisis callout: £250-£900",
        "Missed care windows"
      ];

      // Global simulation state for ripples, impact points, and lifecycle controls.
      let width = 0;
      let height = 0;
      let dpr = 1;
      let viewportShortSide = 0;
      let ripples = [];
      let impactPoints = [];
      let simulationStart = 0;
      let mainLoopId = null;
      let blockedSpawning = false;
      let hasReachedCascadeState = false;
      let narrativeBanner = { startedAt: null, shown: false, done: false };
      let fadeState = {
        phase: "none",
        startedAt: 0
      };
      let restarting = false;

      const TOTAL_CAP = 120;
      const RESUME_CAP = 80;
      const LOOP_DURATION_MS = 90_000;
      const LOOP_FADE_MS = 3_000;
      const LOOP_PAUSE_MS = 2_000;
      const FIRST_DROP_DELAY_MS = 1_500;
      const NARRATIVE_SHOW_AFTER_MS = 20_000;
      const NARRATIVE_HOLD_MS = 6_000;
      const NARRATIVE_FADE_MS = 900;

      // Utility helper to get a random float in an inclusive range.
      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      // Utility helper to get a random integer in an inclusive range.
      function randomInt(min, max) {
        return Math.floor(randomRange(min, max + 1));
      }

      // Utility helper to clamp a number to a bounded interval.
      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      // Utility helper to linearly interpolate between two numbers.
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      // Utility helper to pick one random item from an array.
      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      // Compute baseline ripple radius for initial drop from current viewport size.
      function getBaseMaxRadius() {
        return viewportShortSide * 0.4;
      }

      // Configure canvas dimensions with HiDPI scaling while preserving simulation state.
      function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        width = Math.max(1, window.innerWidth);
        height = Math.max(1, window.innerHeight);
        viewportShortSide = Math.min(width, height);

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // Ripple class models expanding cost rings and cascade trigger points.
      class Ripple {
        constructor(options) {
          this.x = options.x;
          this.y = options.y;
          this.tier = options.tier || 0;
          this.radius = 0;
          this.maxRadius = options.maxRadius;
          this.speed = randomRange(0.8, 1.4);
          this.opacity = 0.9;
          this.colour = RIPPLE_COLORS[Math.min(this.tier, RIPPLE_COLORS.length - 1)];
          this.costLabel = pickRandom(COST_FACTS);
          this.hasTriggered = false;
          this.triggerThreshold = this.maxRadius * randomRange(0.6, 0.75);
          this.parentMaxRadius = options.parentMaxRadius || options.maxRadius;
        }

        // Update radius growth and fade based on distance travelled.
        update(deltaScale) {
          this.radius += this.speed * deltaScale;
          const progress = clamp(this.radius / this.maxRadius, 0, 1);
          this.opacity = 0.9 * (1 - progress);
        }

        // Draw ring arc plus a small ambient cost label at 3 o'clock.
        draw(renderCtx) {
          if (this.opacity <= 0) {
            return;
          }

          renderCtx.save();
          renderCtx.strokeStyle = this.colour;
          renderCtx.globalAlpha = this.opacity;
          renderCtx.lineWidth = lerp(2.4, 1.1, clamp(this.radius / this.maxRadius, 0, 1));
          renderCtx.beginPath();
          renderCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          renderCtx.stroke();
          renderCtx.restore();

          const labelX = this.x + this.radius + 10;
          const labelY = this.y;
          const labelOpacity = this.opacity * 0.75;
          if (labelOpacity <= 0.02) {
            return;
          }

          renderCtx.save();
          renderCtx.font = "11px " + FONT_STACK;
          renderCtx.textBaseline = "middle";
          const padX = 6;
          const padY = 3;
          const textWidth = renderCtx.measureText(this.costLabel).width;
          const boxWidth = textWidth + padX * 2;
          const boxHeight = 18;

          renderCtx.globalAlpha = labelOpacity;
          renderCtx.fillStyle = COST_LABEL_BG;
          renderCtx.beginPath();
          renderCtx.roundRect(labelX, labelY - boxHeight / 2, boxWidth, boxHeight, 8);
          renderCtx.fill();

          renderCtx.fillStyle = COST_LABEL_TEXT;
          renderCtx.fillText(this.costLabel, labelX + padX, labelY);
          renderCtx.restore();
        }

        // Check if this ripple should emit new impact points and schedule them.
        maybeTrigger(emitFn) {
          if (this.hasTriggered || this.radius < this.triggerThreshold) {
            return;
          }
          this.hasTriggered = true;
          emitFn(this);
        }

        // Determine if the ripple has completed its visual lifetime.
        get isExpired() {
          return this.opacity <= 0 || this.radius >= this.maxRadius;
        }
      }

      // ImpactPoint class models delayed stone drops, flash, and person cost badges.
      class ImpactPoint {
        constructor(options) {
          this.x = options.x;
          this.y = options.y;
          this.personType = options.personType;
          this.delay = options.delay || 0;
          this.createdAt = options.createdAt;
          this.activated = options.activated || false;
          this.activatedAt = options.activatedAt || 0;
          this.flashOpacity = this.activated ? 1 : 0;
          this.labelOpacity = 0;
          this.labelMaxOpacity = 0.96;
          this.rippleSpawned = false;
          this.customTitle = options.customTitle || "";
          this.customLabelScale = options.customLabelScale || 1;
          this.nextMaxRadius = options.nextMaxRadius || getBaseMaxRadius();
          this.nextTier = options.nextTier || 0;
          this.sourceRippleMaxRadius = options.sourceRippleMaxRadius || this.nextMaxRadius;
        }

        // Activate this point once its delay has elapsed.
        activate(now) {
          this.activated = true;
          this.activatedAt = now;
          this.flashOpacity = 1;
          this.labelOpacity = 0;
        }

        // Update visual phases and spawn a ripple shortly after activation.
        update(now, spawnRippleFn) {
          if (!this.activated && now - this.createdAt >= this.delay) {
            this.activate(now);
          }

          if (!this.activated) {
            return;
          }

          const elapsed = now - this.activatedAt;
          const flashProgress = clamp(elapsed / 600, 0, 1);
          this.flashOpacity = 1 - flashProgress;

          if (elapsed < 400) {
            this.labelOpacity = (elapsed / 400) * this.labelMaxOpacity;
          } else if (elapsed < 1_700) {
            this.labelOpacity = this.labelMaxOpacity;
          } else if (elapsed < 2_300) {
            const fadeOutProgress = (elapsed - 1_700) / 600;
            this.labelOpacity = (1 - fadeOutProgress) * this.labelMaxOpacity;
          } else {
            this.labelOpacity = 0;
          }

          if (!this.rippleSpawned && elapsed >= 200) {
            this.rippleSpawned = true;
            spawnRippleFn(this);
          }
        }

        // Draw activation flash and contextual person/cost pill near the point.
        draw(renderCtx) {
          if (this.activated && this.flashOpacity > 0) {
            const flashRadius = lerp(8, 4, clamp(1 - this.flashOpacity, 0, 1));
            const gradient = renderCtx.createRadialGradient(
              this.x,
              this.y,
              0,
              this.x,
              this.y,
              flashRadius * 2.2
            );
            gradient.addColorStop(0, "rgba(255, 255, 255, " + (this.flashOpacity * 0.95).toFixed(3) + ")");
            gradient.addColorStop(0.45, "rgba(0, 200, 150, " + (this.flashOpacity * 0.7).toFixed(3) + ")");
            gradient.addColorStop(1, "rgba(0, 200, 150, 0)");
            renderCtx.save();
            renderCtx.fillStyle = gradient;
            renderCtx.beginPath();
            renderCtx.arc(this.x, this.y, flashRadius * 2.2, 0, Math.PI * 2);
            renderCtx.fill();
            renderCtx.restore();
          }

          if (this.labelOpacity <= 0 || !this.activated) {
            return;
          }

          const title = this.customTitle || this.personType.label;
          const detail = this.customTitle
            ? "Estimated unmet pathway burden"
            : this.personType.costLabel;

          const scale = this.customLabelScale;
          const fontSizeTitle = Math.round(12 * scale);
          const fontSizeDetail = Math.round(10 * scale);
          const padX = Math.round(10 * scale);
          const padY = Math.round(8 * scale);
          const lineGap = Math.round(4 * scale);

          renderCtx.save();
          renderCtx.globalAlpha = this.labelOpacity;
          renderCtx.font = "600 " + fontSizeTitle + "px " + FONT_STACK;
          const titleWidth = renderCtx.measureText(title).width;
          renderCtx.font = fontSizeDetail + "px " + FONT_STACK;
          const detailWidth = renderCtx.measureText(detail).width;
          const contentWidth = Math.max(titleWidth, detailWidth);
          const boxWidth = contentWidth + padX * 2;
          const boxHeight = fontSizeTitle + fontSizeDetail + lineGap + padY * 2;

          let boxX = this.x + 12;
          let boxY = this.y - boxHeight - 14;

          if (boxX + boxWidth > width - 8) {
            boxX = this.x - boxWidth - 12;
          }
          if (boxX < 8) {
            boxX = 8;
          }
          if (boxY < 8) {
            boxY = this.y + 12;
          }
          if (boxY + boxHeight > height - 8) {
            boxY = height - boxHeight - 8;
          }

          renderCtx.fillStyle = COST_LABEL_BG;
          renderCtx.beginPath();
          renderCtx.roundRect(boxX, boxY, boxWidth, boxHeight, Math.round(10 * scale));
          renderCtx.fill();

          renderCtx.fillStyle = COST_LABEL_TEXT;
          renderCtx.font = "600 " + fontSizeTitle + "px " + FONT_STACK;
          renderCtx.textBaseline = "top";
          renderCtx.fillText(title, boxX + padX, boxY + padY);

          renderCtx.font = fontSizeDetail + "px " + FONT_STACK;
          renderCtx.globalAlpha = this.labelOpacity * 0.92;
          renderCtx.fillText(detail, boxX + padX, boxY + padY + fontSizeTitle + lineGap);
          renderCtx.restore();
        }

        // Determine if point can be removed once visual and spawning phases complete.
        get isExpired() {
          return this.activated && this.rippleSpawned && this.flashOpacity <= 0 && this.labelOpacity <= 0.01;
        }
      }

      // Emit 1-3 delayed impact points along a ripple circumference.
      function spawnCascadeImpactsFromRipple(ripple, now) {
        if (blockedSpawning) {
          return;
        }
        const nextMax = ripple.maxRadius * 0.85;
        if (nextMax < 60) {
          return;
        }

        const spawnCount = randomInt(1, 3);
        for (let i = 0; i < spawnCount; i += 1) {
          const angle = randomRange(0, Math.PI * 2);
          const x = ripple.x + Math.cos(angle) * ripple.radius;
          const y = ripple.y + Math.sin(angle) * ripple.radius;
          const clampedX = clamp(x, 20, width - 20);
          const clampedY = clamp(y, 20, height - 20);
          const personType = pickPersonTypeForTier(Math.min(ripple.tier + 1, 3));
          const delay = randomInt(100, 400);

          impactPoints.push(
            new ImpactPoint({
              x: clampedX,
              y: clampedY,
              personType,
              delay,
              createdAt: now,
              activated: false,
              nextMaxRadius: nextMax,
              nextTier: Math.min(ripple.tier + 1, 2),
              sourceRippleMaxRadius: ripple.maxRadius
            })
          );
        }
      }

      // Pick a person type with weighted preference around the requested cascade tier.
      function pickPersonTypeForTier(targetTier) {
        const weighted = PERSON_TYPES.map((person) => {
          const distance = Math.abs(person.tier - targetTier);
          const weight = distance === 0 ? 4 : distance === 1 ? 2 : 1;
          return { person, weight };
        });

        const total = weighted.reduce((sum, item) => sum + item.weight, 0);
        let roll = randomRange(0, total);
        for (const item of weighted) {
          roll -= item.weight;
          if (roll <= 0) {
            return item.person;
          }
        }
        return weighted[0].person;
      }

      // Spawn a ripple at an activated impact point using inherited scale limits.
      function spawnRippleFromImpact(point) {
        if (blockedSpawning) {
          return;
        }
        if (point.nextMaxRadius < 60) {
          return;
        }
        ripples.push(
          new Ripple({
            x: point.x,
            y: point.y,
            maxRadius: point.nextMaxRadius,
            tier: point.nextTier,
            parentMaxRadius: point.sourceRippleMaxRadius
          })
        );
      }

      // Render static and timed overlay text above all simulation layers.
      function drawAmbientUI(now) {
        ctx.save();
        ctx.textBaseline = "top";

        ctx.globalAlpha = 0.6;
        ctx.fillStyle = "#00c896";
        ctx.font = "600 13px " + FONT_STACK;
        ctx.fillText("THE RIPPLE CASCADE", 18, 16);

        ctx.globalAlpha = 0.4;
        ctx.fillStyle = "#ffffff";
        ctx.font = "11px " + FONT_STACK;
        ctx.fillText("One untreated case. Compounding cost. No end point.", 18, 36);

        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "#00c896";
        ctx.font = "12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
        ctx.textBaseline = "bottom";
        ctx.fillText("Active cost centres: " + impactPoints.length, 18, height - 16);

        ctx.globalAlpha = 0.35;
        ctx.fillStyle = "#00c896";
        ctx.textBaseline = "bottom";
        ctx.font = "11px " + FONT_STACK;
        const watermark = "OTOS Digital Ltd";
        const watermarkWidth = ctx.measureText(watermark).width;
        ctx.fillText(watermark, width - watermarkWidth - 16, height - 14);

        drawNarrativeBanner(now);
        ctx.restore();
      }

      // Draw the late-appearing intervention statement with fade and underline.
      function drawNarrativeBanner(now) {
        if (narrativeBanner.done) {
          return;
        }

        const elapsed = now - simulationStart;
        if (elapsed < NARRATIVE_SHOW_AFTER_MS) {
          return;
        }
        if (!narrativeBanner.shown) {
          narrativeBanner.shown = true;
          narrativeBanner.startedAt = now;
        }

        const sinceBanner = now - narrativeBanner.startedAt;
        const totalVisible = NARRATIVE_FADE_MS + NARRATIVE_HOLD_MS + NARRATIVE_FADE_MS;

        if (sinceBanner >= totalVisible) {
          narrativeBanner.done = true;
          return;
        }

        let alpha = 0;
        if (sinceBanner < NARRATIVE_FADE_MS) {
          alpha = sinceBanner / NARRATIVE_FADE_MS;
        } else if (sinceBanner < NARRATIVE_FADE_MS + NARRATIVE_HOLD_MS) {
          alpha = 1;
        } else {
          const fadeOutElapsed = sinceBanner - (NARRATIVE_FADE_MS + NARRATIVE_HOLD_MS);
          alpha = 1 - fadeOutElapsed / NARRATIVE_FADE_MS;
        }

        const message = "OTOS enters here \u2014 before the first ring leaves the water.";
        ctx.save();
        ctx.globalAlpha = clamp(alpha, 0, 1);
        ctx.fillStyle = "#ffffff";
        ctx.font = "500 14px " + FONT_STACK;
        ctx.textBaseline = "middle";
        const textWidth = ctx.measureText(message).width;
        const x = (width - textWidth) / 2;
        const y = height - Math.max(68, height * 0.1);
        ctx.fillText(message, x, y);

        ctx.strokeStyle = "#00c896";
        ctx.globalAlpha = clamp(alpha * 0.9, 0, 1);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, y + 14);
        ctx.lineTo(x + textWidth, y + 14);
        ctx.stroke();
        ctx.restore();
      }

      // Keep spawn throttling in bounds to protect framerate on lower-powered hardware.
      function updateSpawnGuardrails() {
        const total = ripples.length + impactPoints.length;
        if (!blockedSpawning && total > TOTAL_CAP) {
          blockedSpawning = true;
        } else if (blockedSpawning && total < RESUME_CAP) {
          blockedSpawning = false;
        }
      }

      // Determine when to start fade-out/reset cycle based on duration or natural decay.
      function maybeStartLoopFade(now) {
        if (fadeState.phase !== "none") {
          return;
        }
        const elapsed = now - simulationStart;
        const activeRipples = ripples.length;
        if (activeRipples >= 5) {
          hasReachedCascadeState = true;
        }
        const naturallyDecayed = hasReachedCascadeState && activeRipples < 5 && elapsed > 12_000;
        if (elapsed >= LOOP_DURATION_MS || naturallyDecayed) {
          fadeState.phase = "fading";
          fadeState.startedAt = now;
        }
      }

      // Draw global fade and manage transition to the next simulation cycle.
      function handleLoopFade(now) {
        if (fadeState.phase === "none") {
          return;
        }

        if (fadeState.phase === "fading") {
          const t = clamp((now - fadeState.startedAt) / LOOP_FADE_MS, 0, 1);
          ctx.save();
          ctx.globalAlpha = t * 0.92;
          ctx.fillStyle = "#000000";
          ctx.fillRect(0, 0, width, height);
          ctx.restore();
          if (t >= 1) {
            fadeState.phase = "paused";
            fadeState.startedAt = now;
          }
          return;
        }

        if (fadeState.phase === "paused") {
          ctx.save();
          ctx.globalAlpha = 0.92;
          ctx.fillStyle = "#000000";
          ctx.fillRect(0, 0, width, height);
          ctx.restore();
          if (now - fadeState.startedAt >= LOOP_PAUSE_MS && !restarting) {
            restarting = true;
            setTimeout(() => {
              restartSimulation();
              restarting = false;
            }, 0);
          }
        }
      }

      // Build and schedule the initial center impact after startup delay.
      function scheduleFirstDrop() {
        impactPoints.push(
          new ImpactPoint({
            x: width / 2,
            y: height / 2,
            personType: { label: "Index Case", costLabel: "Initial untreated system load", tier: 0 },
            delay: FIRST_DROP_DELAY_MS,
            createdAt: performance.now(),
            activated: false,
            customTitle: "One person. Untreated ADHD + Addiction.",
            customLabelScale: 1.1,
            nextMaxRadius: getBaseMaxRadius(),
            nextTier: 0,
            sourceRippleMaxRadius: getBaseMaxRadius()
          })
        );
      }

      // Reset all state and restart from the first manually placed drop.
      function restartSimulation() {
        ripples = [];
        impactPoints = [];
        blockedSpawning = false;
        hasReachedCascadeState = false;
        fadeState.phase = "none";
        fadeState.startedAt = 0;
        narrativeBanner = { startedAt: null, shown: false, done: false };
        simulationStart = performance.now();
        scheduleFirstDrop();
      }

      // Main animation loop updates simulation entities and draws each frame.
      function animate(now) {
        if (!simulationStart) {
          simulationStart = now;
        }

        const deltaScale = 1;
        updateSpawnGuardrails();

        ctx.save();
        ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(10, 15, 26, 0.15)";
        ctx.fillRect(0, 0, width, height);
        ctx.restore();

        for (let i = 0; i < ripples.length; i += 1) {
          const ripple = ripples[i];
          ripple.update(deltaScale);
          ripple.draw(ctx);
          ripple.maybeTrigger((r) => spawnCascadeImpactsFromRipple(r, now));
        }

        for (let i = 0; i < impactPoints.length; i += 1) {
          const point = impactPoints[i];
          point.update(now, spawnRippleFromImpact);
          point.draw(ctx);
        }

        ripples = ripples.filter((ripple) => !ripple.isExpired);
        impactPoints = impactPoints.filter((point) => !point.isExpired);

        drawAmbientUI(now);
        maybeStartLoopFade(now);
        handleLoopFade(now);

        mainLoopId = window.requestAnimationFrame(animate);
      }

      // Initialize simulation wiring and start the animation loop.
      function init() {
        resizeCanvas();
        restartSimulation();
        if (mainLoopId !== null) {
          window.cancelAnimationFrame(mainLoopId);
        }
        mainLoopId = window.requestAnimationFrame(animate);
      }

      // Preserve running animation while adapting canvas metrics to viewport changes.
      function handleResize() {
        resizeCanvas();
      }

      window.addEventListener("resize", handleResize, { passive: true });
      init();
    })();
  </script>
</body>
</html>
